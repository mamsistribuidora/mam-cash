<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAM Cash • Verificação de Identidade | Multi-Moeda Premium</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- InputMask para telefone -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.8/jquery.inputmask.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0f0a 0%, #0c0b05 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "💰 💵 💶 💷 💎 🪙";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 70px;
            opacity: 0.03;
            pointer-events: none;
            white-space: pre;
            overflow: hidden;
            letter-spacing: 30px;
            line-height: 1.8;
            animation: floatMoney 40s infinite linear;
            z-index: 0;
        }
        @keyframes floatMoney {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(-200px) translateX(50px); }
        }
        .coin-particle {
            position: fixed;
            font-size: 24px;
            opacity: 0.08;
            pointer-events: none;
            animation: floatCoin 25s infinite ease-in-out;
            z-index: 0;
        }
        @keyframes floatCoin {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        .app-container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .card-premium {
            background: linear-gradient(135deg, #1a160c 0%, #0c0a04 100%);
            border-radius: 32px;
            padding: 26px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 30px 45px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(212,175,55,0.3);
            position: relative;
            overflow: hidden;
        }
        .card-premium::after {
            content: "💳";
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
        .card-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .status-badge {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .status-active { color: #2ecc71; border-left: 3px solid #2ecc71; background: #0a1f0a; }
        .status-inactive { color: #e67e22; border-left: 3px solid #e67e22; background: #1f140a; }
        .status-pending { color: #f39c12; border-left: 3px solid #f39c12; background: #1f140a; }
        .card-number {
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-weight: 500;
            color: #f5e2b0;
            margin-bottom: 28px;
            font-family: monospace;
        }
        .card-footer-row {
            display: flex;
            justify-content: space-between;
            color: #d4af37;
            font-size: 0.75rem;
        }
        .currency-tabs {
            display: flex;
            gap: 12px;
            background: #12100c;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid #3a321c;
        }
        .currency-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            border-radius: 50px;
            font-weight: bold;
            color: #b9a46b;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .currency-btn.active {
            background: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }
        .balance-box {
            background: linear-gradient(145deg, #0e0c07, #080703);
            border-radius: 28px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #d4af3740;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }
        .balance-amount {
            font-size: 2.9rem;
            font-weight: 800;
            color: #f5c542;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .btn-gold {
            background: linear-gradient(95deg, #d4af37, #b8941e);
            border: none;
            padding: 15px;
            border-radius: 48px;
            font-weight: bold;
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .btn-gold:hover { transform: scale(0.97); background: linear-gradient(95deg, #c6a12e, #a57e18); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d4af37;
            padding: 15px;
            border-radius: 48px;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover { background: #d4af3715; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1710;
            max-width: 94%;
            width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 48px;
            padding: 32px;
            border-top: 4px solid #d4af37;
            box-shadow: 0 30px 50px black;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: #2c271e;
            border: 1px solid #d4af3760;
            border-radius: 60px;
            color: #fff;
            font-size: 0.95rem;
        }
        .admin-panel {
            background: #0e0c08;
            border-radius: 32px;
            padding: 22px;
            margin-top: 24px;
            border: 1px solid #d4af3740;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1b12;
            color: #ffdf9c;
            padding: 12px 28px;
            border-radius: 60px;
            border-left: 5px solid #d4af37;
            z-index: 3000;
            display: none;
            font-weight: bold;
            box-shadow: 0 8px 20px black;
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #d4af37;
            background: transparent;
            border: none;
            font-size: 1.1rem;
        }
        .camera-preview {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 12px 0;
        }
        .camera-preview video, .camera-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            margin: 10px 0;
        }
        .kyc-status {
            background: #1a1710;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        @media (max-width: 500px) {
            .balance-amount { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div id="coinParticles"></div>
<div id="appRoot"></div>
<div id="toastMessage" class="toast"></div>

<script>
    // Firebase Config (fornecida)
    const firebaseConfig = {
        apiKey: 'AIzaSyC90uEwso8ZP3s7tLvV_z88ZbUijXLOpPU',
        authDomain: 'project-73108ea9-d1b2-4ac3-8fb.firebaseapp.com',
        projectId: 'project-73108ea9-d1b2-4ac3-8fb',
        storageBucket: 'project-73108ea9-d1b2-4ac3-8fb.firebasestorage.app',
        messagingSenderId: '869497428830',
        appId: '1:869497428830:web:27ef20567761e7b0d3cdcf'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    const ADMIN_EMAIL = "mamfilhos29@gmail.com";
    let exchangeRates = { AOA_USD: 0.00115, USD_AOA: 870, AOA_BRL: 0.0062, BRL_AOA: 161, USD_BRL: 5.35, BRL_USD: 0.187 };
    
    let currentUser = null;
    let currentCurrency = 'AOA';
    let userBalances = { AOA: 0, USD: 0, BRL: 0 };
    let cardActivated = false;
    let userCardData = null;
    let pending2FACode = null;
    let pending2FAType = null;
    let pendingLoginEmail = null;
    
    function createCoinParticles() {
        const container = document.getElementById('coinParticles');
        const coins = ['💰', '💵', '💶', '🪙', '💷', '💎'];
        for (let i = 0; i < 35; i++) {
            const particle = document.createElement('div');
            particle.className = 'coin-particle';
            particle.innerHTML = coins[Math.floor(Math.random() * coins.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 30 + 's';
            particle.style.animationDuration = 15 + Math.random() * 25 + 's';
            particle.style.fontSize = (20 + Math.random() * 40) + 'px';
            container.appendChild(particle);
        }
    }
    createCoinParticles();
    
    function showToast(msg) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }
    
    function formatMoney(value, currency) {
        if (isNaN(value)) value = 0;
        const opts = { style: 'currency', currency: currency, minimumFractionDigits: 2 };
        if (currency === 'AOA') opts.currency = 'AOA';
        return new Intl.NumberFormat('pt-AO', opts).format(value);
    }
    
    function generateCardNumber() {
        let num = '';
        for (let i = 0; i < 16; i++) num += Math.floor(Math.random() * 10);
        return num.match(/.{4}/g).join(' ');
    }
    
    function generateCVV() {
        return Math.floor(100 + Math.random() * 900).toString();
    }
    
    function generateExpiry() {
        const date = new Date();
        const year = date.getFullYear() + 5;
        const month = String(date.getMonth() + 1).padStart(2, '0');
        return `${month}/${year.toString().slice(-2)}`;
    }
    
    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            userBalances = { AOA: data.balances?.AOA ?? 0, USD: data.balances?.USD ?? 0, BRL: data.balances?.BRL ?? 0 };
            cardActivated = data.cardActivated || false;
            window.userKycStatus = data.kycStatus || 'pending';
            window.userCardData = data.cardData || null;
            window.linkedIBAN = data.linkedIBAN || '';
            window.linkedPaypal = data.linkedPaypal || '';
            window.userFullName = `${data.firstName || ''} ${data.lastName || ''}`;
        } else {
            userBalances = { AOA: 0, USD: 0, BRL: 0 };
            cardActivated = false;
            window.userKycStatus = 'pending';
            window.userCardData = null;
        }
    }
    
    async function updateFirestoreBalances(uid) {
        await db.collection('users').doc(uid).update({ balances: userBalances });
    }
    
    async function requestCardPurchase(uid) {
        if (cardActivated) { showToast('Cartão já está ativo'); return false; }
        if (window.userKycStatus !== 'approved') { showToast('É necessário ter a identidade verificada pelo ADMIN primeiro!'); return false; }
        if (userBalances.AOA < 5000 && currentUser.email !== ADMIN_EMAIL) {
            showToast(`Saldo insuficiente em AOA. Taxa: ${formatMoney(5000, 'AOA')}`);
            return false;
        }
        
        // Para ADMIN, cartão gratuito e automático
        if (currentUser.email === ADMIN_EMAIL) {
            const cardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: generateExpiry() };
            await db.collection('users').doc(uid).update({ cardActivated: true, cardData: cardData });
            cardActivated = true;
            window.userCardData = cardData;
            showToast('✨ Cartão ADMIN gerado com sucesso!');
            renderDashboard();
            return true;
        }
        
        await db.collection('cardRequests').add({
            userId: uid,
            userEmail: currentUser.email,
            status: 'pending',
            fee: 5000,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('✅ Pedido de cartão enviado. Aguarde aprovação do ADMIN.');
        return true;
    }
    
    async function adminApproveCard(userId, fee) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        if (!userDoc.exists) return;
        const balances = userDoc.data().balances || { AOA: 0, USD: 0, BRL: 0 };
        if (balances.AOA < fee) { showToast('Saldo insuficiente para taxa'); return; }
        const newBalances = { ...balances };
        newBalances.AOA = balances.AOA - fee;
        const cardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: generateExpiry() };
        await userRef.update({ balances: newBalances, cardActivated: true, cardData: cardData });
        const reqQuery = await db.collection('cardRequests').where('userId', '==', userId).where('status', '==', 'pending').get();
        reqQuery.forEach(doc => doc.ref.update({ status: 'approved' }));
        showToast(`💳 Cartão aprovado! Taxa: ${formatMoney(fee, 'AOA')}`);
        if (currentUser && currentUser.uid === userId) {
            userBalances = newBalances;
            cardActivated = true;
            window.userCardData = cardData;
            renderDashboard();
        }
    }
    
    async function uploadKYCFile(userId, file, type) {
        if (!file) return null;
        const ext = file.name.split('.').pop();
        const filename = `${userId}/${type}_${Date.now()}.${ext}`;
        const ref = storage.ref().child(`kyc/${filename}`);
        await ref.put(file);
        return await ref.getDownloadURL();
    }
    
    async function submitKYC(selfieFile, idFrontFile, idBackFile) {
        if (!selfieFile || !idFrontFile) { showToast('Selfie e documento são obrigatórios'); return; }
        showToast('Enviando documentos...');
        const selfieUrl = await uploadKYCFile(currentUser.uid, selfieFile, 'selfie');
        const idFrontUrl = await uploadKYCFile(currentUser.uid, idFrontFile, 'id_front');
        let idBackUrl = null;
        if (idBackFile) idBackUrl = await uploadKYCFile(currentUser.uid, idBackFile, 'id_back');
        
        await db.collection('users').doc(currentUser.uid).update({
            kycStatus: 'pending_review',
            kycDocuments: { selfie: selfieUrl, idFront: idFrontUrl, idBack: idBackUrl },
            kycSubmittedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('📄 Documentos enviados! Aguarde aprovação do ADMIN.');
        renderDashboard();
    }
    
    async function adminApproveKYC(userId) {
        await db.collection('users').doc(userId).update({ kycStatus: 'approved' });
        showToast('✅ Identidade aprovada! Usuário agora pode solicitar cartão.');
        renderDashboard();
    }
    
    async function exchangeCurrency(from, to, amount) {
        if (amount <= 0) return false;
        let rate = 1;
        const rates = { 'AOA_USD': exchangeRates.AOA_USD, 'USD_AOA': exchangeRates.USD_AOA, 'AOA_BRL': exchangeRates.AOA_BRL, 'BRL_AOA': exchangeRates.BRL_AOA, 'USD_BRL': exchangeRates.USD_BRL, 'BRL_USD': exchangeRates.BRL_USD };
        rate = rates[`${from}_${to}`];
        if (!rate) { showToast('Par não suportado'); return false; }
        if (userBalances[from] < amount) { showToast(`Saldo insuficiente em ${from}`); return false; }
        const converted = amount * rate;
        userBalances[from] -= amount;
        userBalances[to] += converted;
        await updateFirestoreBalances(currentUser.uid);
        showToast(`🔄 Conversão: ${formatMoney(amount, from)} → ${formatMoney(converted, to)}`);
        renderDashboard();
        return true;
    }
    
    function sendVerificationCode(email, phone, type) {
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        pending2FACode = code;
        if (type === 'email') {
            showToast(`📧 Código enviado para ${email}: ${code} (simulação)`);
        } else {
            showToast(`📱 Código enviado para ${phone}: ${code} (simulação)`);
        }
        return code;
    }
    
    async function renderDashboard() {
        if (!currentUser) { renderLogin(); return; }
        await loadUserData(currentUser.uid);
        const isAdmin = (currentUser.email === ADMIN_EMAIL);
        const balanceNow = userBalances[currentCurrency] || 0;
        let cardStatusText = 'BLOQUEADO';
        let cardStatusClass = 'status-inactive';
        if (window.userKycStatus === 'pending') cardStatusText = 'AGUARDANDO KYC';
        else if (window.userKycStatus === 'pending_review') cardStatusText = 'KYC EM ANÁLISE';
        else if (window.userKycStatus === 'approved' && !cardActivated) cardStatusText = 'KYC APROVADO • CARTÃO PENDENTE';
        else if (cardActivated) { cardStatusText = 'ATIVO • PREMIUM'; cardStatusClass = 'status-active'; }
        
        let html = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div><i class="fas fa-gem" style="color:#d4af37"></i> <span style="color:#e6d5a8;">${window.userFullName || currentUser.email}</span></div>
                <button id="logoutMainBtn" style="background:#222216; border:1px solid #d4af37; padding:8px 18px; border-radius:40px; color:#d4af37; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
            <div class="card-premium">
                <div class="card-status">
                    <span class="status-badge ${cardStatusClass}"><i class="fas ${cardActivated ? 'fa-check-circle' : 'fa-lock'}"></i> ${cardStatusText}</span>
                    <span><i class="fas fa-microchip"></i> MAM BLACK</span>
                </div>
                <div class="card-number">${window.userCardData ? window.userCardData.number : '****  ****  ****  ****'}</div>
                <div class="card-footer-row">
                    <span>Validade: ${window.userCardData ? window.userCardData.expiry : '**/**'}</span>
                    <span>CVV: ${window.userCardData ? window.userCardData.cvv : '***'}</span>
                </div>
            </div>`;
        
        if (window.userKycStatus !== 'approved' && window.userKycStatus !== 'pending_review' && !cardActivated && currentUser.email !== ADMIN_EMAIL) {
            html += `<div class="kyc-status">
                        <h3 style="color:#d4af37;"><i class="fas fa-id-card"></i> Verificação de Identidade (KYC)</h3>
                        <p style="color:#b9a46b;">Para solicitar seu cartão, complete a verificação enviando:</p>
                        <button id="openKycBtn" class="btn-gold" style="margin:15px auto;"><i class="fas fa-camera"></i> Enviar Selfie + Documento</button>
                    </div>`;
        }
        
        html += `
            <div class="currency-tabs">
                <button class="currency-btn ${currentCurrency === 'AOA' ? 'active' : ''}" data-cur="AOA"><i class="fas fa-coins"></i> Kwanza (AOA)</button>
                <button class="currency-btn ${currentCurrency === 'USD' ? 'active' : ''}" data-cur="USD"><i class="fas fa-dollar-sign"></i> USD</button>
                <button class="currency-btn ${currentCurrency === 'BRL' ? 'active' : ''}" data-cur="BRL"><i class="fas fa-real"></i> BRL</button>
            </div>
            <div class="balance-box">
                <div style="font-size:0.8rem; color:#d4af37;">Saldo disponível</div>
                <div class="balance-amount">${formatMoney(balanceNow, currentCurrency)}</div>
            </div>
            <div class="action-grid">
                <button id="btnTransfer" class="btn-gold"><i class="fas fa-exchange-alt"></i> Transferir</button>
                <button id="btnDeposit" class="btn-gold"><i class="fas fa-upload"></i> Depositar</button>
                <button id="btnExchange" class="btn-outline"><i class="fas fa-chart-line"></i> Câmbio</button>
                <button id="btnBuyCard" class="btn-outline"><i class="fas fa-credit-card"></i> ${cardActivated ? 'Cartão Ativo' : 'Comprar Cartão'}</button>
            </div>`;
        
        if (isAdmin) {
            const pendingKycSnap = await db.collection('users').where('kycStatus', '==', 'pending_review').get();
            const pendingCardsSnap = await db.collection('cardRequests').where('status', '==', 'pending').get();
            const allUsersSnap = await db.collection('users').get();
            let pendingKyc = [], pendingCards = [];
            pendingKycSnap.forEach(d => pendingKyc.push({id: d.id, ...d.data()}));
            pendingCardsSnap.forEach(d => pendingCards.push({id: d.id, ...d.data()}));
            
            html += `<div class="admin-panel"><h3 style="color:#d4af37;"><i class="fas fa-crown"></i> Painel ADM</h3>`;
            html += `<h4>🆔 Verificações KYC Pendentes</h4>`;
            if(pendingKyc.length===0) html+=`<p>Nenhuma verificação pendente</p>`;
            for(const user of pendingKyc) {
                html += `<div style="border:1px solid #d4af37; border-radius:24px; padding:15px; margin:12px 0;">
                            <strong>${user.email}</strong><br>
                            ${user.kycDocuments?.selfie ? `<div><img src="${user.kycDocuments.selfie}" style="max-width:100px; border-radius:12px; margin:5px;"> Selfie</div>` : ''}
                            ${user.kycDocuments?.idFront ? `<div><img src="${user.kycDocuments.idFront}" style="max-width:100px; border-radius:12px; margin:5px;"> Documento Frente</div>` : ''}
                            ${user.kycDocuments?.idBack ? `<div><img src="${user.kycDocuments.idBack}" style="max-width:100px; border-radius:12px; margin:5px;"> Documento Verso</div>` : ''}
                            <button class="approveKycBtn" data-uid="${user.id}" style="background:#27ae60; border:none; padding:8px 20px; border-radius:40px; margin-top:10px;">✔ Aprovar Identidade</button>
                         </div>`;
            }
            html += `<h4 style="margin-top:20px;">💳 Pedidos de Cartão</h4>`;
            if(pendingCards.length===0) html+=`<p>Sem pedidos</p>`;
            pendingCards.forEach(card => {
                html += `<div style="background:#1a1710; padding:12px; margin:8px 0; border-radius:20px;">
                            <div>👤 ${card.userEmail}</div>
                            <button class="approveCardBtn" data-uid="${card.userId}" data-fee="${card.fee}" style="background:#d4af37; border:none; padding:6px 18px; border-radius:40px;">💳 Gerar Cartão (Cobrar ${formatMoney(card.fee, 'AOA')})</button>
                         </div>`;
            });
            html += `</div>`;
        }
        document.getElementById('appRoot').innerHTML = html;
        
        document.querySelectorAll('.currency-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentCurrency = btn.getAttribute('data-cur'); renderDashboard(); });
        });
        document.getElementById('btnTransfer')?.addEventListener('click', () => openTransferModal());
        document.getElementById('btnDeposit')?.addEventListener('click', () => openDepositModal());
        document.getElementById('btnExchange')?.addEventListener('click', () => openExchangeModal());
        document.getElementById('btnBuyCard')?.addEventListener('click', () => requestCardPurchase(currentUser.uid));
        document.getElementById('logoutMainBtn')?.addEventListener('click', () => auth.signOut());
        document.getElementById('openKycBtn')?.addEventListener('click', () => openKycModal());
        
        if (isAdmin) {
            document.querySelectorAll('.approveKycBtn').forEach(btn => {
                btn.addEventListener('click', async () => { await adminApproveKYC(btn.getAttribute('data-uid')); renderDashboard(); });
            });
            document.querySelectorAll('.approveCardBtn').forEach(btn => {
                btn.addEventListener('click', async () => { await adminApproveCard(btn.getAttribute('data-uid'), parseFloat(btn.getAttribute('data-fee'))); renderDashboard(); });
            });
        }
    }
    
    function openKycModal() {
        let stream = null;
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-id-card"></i> Verificação de Identidade</h3>
            <p style="color:#d4af37;">Selfie com a câmera</p>
            <div class="camera-preview"><video id="cameraVideo" autoplay playsinline></video></div>
            <button id="captureSelfieBtn" class="btn-gold"><i class="fas fa-camera"></i> Tirar Selfie</button>
            <canvas id="selfieCanvas" style="display:none;"></canvas>
            <img id="selfiePreview" class="image-preview" style="display:none;">
            <p style="margin-top:15px;">Documento de Identidade (Frente)</p>
            <input type="file" id="idFrontInput" accept="image/*">
            <p>Documento Verso (opcional)</p>
            <input type="file" id="idBackInput" accept="image/*">
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="submitKycBtn" class="btn-gold">Enviar Verificação</button><button id="closeKycModal" class="btn-outline">Fechar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        
        const video = document.getElementById('cameraVideo');
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => { stream = s; video.srcObject = s; }).catch(e => showToast('Erro ao acessar câmera: ' + e.message));
        
        document.getElementById('captureSelfieBtn').onclick = () => {
            const canvas = document.getElementById('selfieCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imgPreview = document.getElementById('selfiePreview');
            imgPreview.src = canvas.toDataURL('image/jpeg');
            imgPreview.style.display = 'block';
            showToast('Selfie capturada!');
        };
        document.getElementById('submitKycBtn').onclick = async () => {
            const canvas = document.getElementById('selfieCanvas');
            if (!canvas.width) { showToast('Tire uma selfie primeiro'); return; }
            const selfieBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
            const selfieFile = new File([selfieBlob], 'selfie.jpg', { type: 'image/jpeg' });
            const idFrontFile = document.getElementById('idFrontInput').files[0];
            if (!idFrontFile) { showToast('Selecione o documento de identificação'); return; }
            const idBackFile = document.getElementById('idBackInput').files[0];
            await submitKYC(selfieFile, idFrontFile, idBackFile);
            if(stream) stream.getTracks().forEach(track => track.stop());
            modal.remove();
        };
        document.getElementById('closeKycModal').onclick = () => { if(stream) stream.getTracks().forEach(track => track.stop()); modal.remove(); };
    }
    
    async function openTransferModal() { /* similar to previous */ }
    async function openDepositModal() { /* similar */ }
    async function openExchangeModal() { /* similar */ }
    
    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:460px; margin: 5vh auto; background:#12100b; border-radius:56px; padding:38px 28px; border:1px solid #d4af37;">
                <div style="text-align:center;"><i class="fas fa-coins" style="font-size:3rem; color:#d4af37;"></i><h2 style="color:#d4af37;">MAM CASH</h2></div>
                <div id="loginView">
                    <input id="loginEmail" placeholder="Email" style="width:100%; margin:12px 0; padding:14px; background:#2a241b; border-radius:60px; color:white;">
                    <div class="password-wrapper"><input id="loginPassword" type="password" placeholder="Senha"><button type="button" id="toggleLoginPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                    <button id="doLoginStep1" class="btn-gold" style="width:100%; margin-top:16px;">Continuar</button>
                    <button id="goToRegister" class="btn-outline" style="width:100%; margin-top:12px;">Criar Conta</button>
                    <div class="forgot-link" id="forgotPasswordBtn">Esqueci a senha</div>
                </div>
                <div id="codeVerificationView" style="display:none;">
                    <p style="color:#d4af37;">Digite o código enviado</p>
                    <input id="verificationCode" placeholder="Código 6 dígitos" style="width:100%; padding:14px; background:#2a241b; border-radius:60px;">
                    <button id="verifyCodeBtn" class="btn-gold" style="width:100%; margin-top:16px;">Verificar</button>
                    <button id="backToLogin" class="btn-outline" style="width:100%; margin-top:12px;">Voltar</button>
                </div>
            </div>`;
        
        document.getElementById('toggleLoginPass')?.addEventListener('click', () => { const inp = document.getElementById('loginPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('doLoginStep1').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if(!email || !password) { showToast('Preencha email e senha'); return; }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                const user = auth.currentUser;
                const doc = await db.collection('users').doc(user.uid).get();
                const phone = doc.exists ? doc.data().phone : '';
                const codeType = confirm('Receber código por Email? (OK=Email, Cancel=SMS)') ? 'email' : 'sms';
                const code = sendVerificationCode(email, phone, codeType);
                pendingLoginEmail = email;
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('codeVerificationView').style.display = 'block';
            } catch(e) { showToast(e.message); }
        };
        document.getElementById('verifyCodeBtn').onclick = () => {
            const code = document.getElementById('verificationCode').value;
            if(code === pending2FACode) {
                showToast('Login verificado!');
                renderDashboard();
            } else { showToast('Código inválido'); }
        };
        document.getElementById('goToRegister').onclick = () => renderRegister();
        document.getElementById('forgotPasswordBtn').onclick = () => { const email = document.getElementById('loginEmail').value; if(email) auth.sendPasswordResetEmail(email).then(()=>showToast('Email enviado')).catch(e=>showToast(e.message)); else showToast('Digite seu email'); };
        document.getElementById('backToLogin').onclick = () => { document.getElementById('loginView').style.display = 'block'; document.getElementById('codeVerificationView').style.display = 'none'; };
    }
    
    function renderRegister() {
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:480px; margin: 3vh auto; background:#12100b; border-radius:56px; padding:32px 28px; border:1px solid #d4af37;">
                <h2 style="color:#d4af37; text-align:center;">Criar Conta</h2>
                <input id="regFirstName" placeholder="Nome" style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <input id="regLastName" placeholder="Sobrenome" style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <input id="regEmail" placeholder="Email" style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <input id="regCountry" placeholder="País" value="Angola" style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <input id="regPhone" placeholder="+244 999 999 999" style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <div class="password-wrapper"><input id="regPassword" type="password" placeholder="Senha (min 6)"><button type="button" id="toggleRegPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <div class="password-wrapper"><input id="regConfirmPassword" type="password" placeholder="Confirmar Senha"><button type="button" id="toggleRegConfirm" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <button id="doRegisterFinal" class="btn-gold" style="width:100%; margin-top:16px;">Registrar e Verificar</button>
                <button id="backToLoginFromReg" class="btn-outline" style="width:100%; margin-top:12px;">Voltar ao Login</button>
            </div>`;
        document.getElementById('toggleRegPass')?.addEventListener('click', () => { const inp = document.getElementById('regPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('toggleRegConfirm')?.addEventListener('click', () => { const inp = document.getElementById('regConfirmPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('doRegisterFinal').onclick = async () => {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const country = document.getElementById('regCountry').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if(!firstName || !lastName || !email || !phone || !password) { showToast('Preencha todos os campos'); return; }
            if(password !== confirm) { showToast('Senhas não coincidem'); return; }
            if(password.length < 6) { showToast('Senha mínima 6 caracteres'); return; }
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCred.user.uid).set({
                    firstName, lastName, email, country, phone,
                    balances: { AOA: 0, USD: 0, BRL: 0 },
                    cardActivated: false, kycStatus: 'pending',
                    linkedIBAN: '', linkedPaypal: '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Conta criada! Complete a verificação KYC no dashboard.');
                renderLogin();
            } catch(e) { showToast(e.message); }
        };
        document.getElementById('backToLoginFromReg').onclick = () => renderLogin();
    }
    
    auth.onAuthStateChanged(async user => {
        if(user) { currentUser = user; await renderDashboard(); }
        else { currentUser = null; renderLogin(); }
    });
</script>
