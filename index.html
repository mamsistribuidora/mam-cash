<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAM Cash • Plataforma Financeira Premium</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0f0a 0%, #0c0b05 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "💰 💵 💶 💷 💎 🪙";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 70px;
            opacity: 0.03;
            pointer-events: none;
            white-space: pre;
            overflow: hidden;
            letter-spacing: 30px;
            line-height: 1.8;
            animation: floatMoney 40s infinite linear;
            z-index: 0;
        }
        @keyframes floatMoney {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(-200px) translateX(50px); }
        }
        .app-container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        /* CORREÇÃO: Inputs com texto BRANCO */
        input, select, textarea {
            color: #FFFFFF !important;
            background: #2c271e !important;
            border: 1px solid #d4af3760 !important;
            border-radius: 60px !important;
            padding: 14px 18px !important;
            font-size: 0.95rem !important;
        }
        input::placeholder, textarea::placeholder {
            color: #b9a46b !important;
        }
        .card-premium {
            background: linear-gradient(135deg, #1a160c 0%, #0c0a04 100%);
            border-radius: 32px;
            padding: 26px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 30px 45px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(212,175,55,0.3);
            position: relative;
            overflow: hidden;
        }
        .card-premium::after {
            content: "💳";
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
        .card-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .status-badge {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .status-active { color: #2ecc71; border-left: 3px solid #2ecc71; background: #0a1f0a; }
        .status-inactive { color: #e67e22; border-left: 3px solid #e67e22; background: #1f140a; }
        .status-pending { color: #f39c12; border-left: 3px solid #f39c12; background: #1f140a; }
        .card-number {
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-weight: 500;
            color: #f5e2b0;
            margin-bottom: 28px;
            font-family: monospace;
        }
        .card-footer-row {
            display: flex;
            justify-content: space-between;
            color: #d4af37;
            font-size: 0.75rem;
        }
        .currency-tabs {
            display: flex;
            gap: 12px;
            background: #12100c;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid #3a321c;
        }
        .currency-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            border-radius: 50px;
            font-weight: bold;
            color: #b9a46b;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .currency-btn.active {
            background: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }
        .balance-box {
            background: linear-gradient(145deg, #0e0c07, #080703);
            border-radius: 28px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #d4af3740;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }
        .balance-amount {
            font-size: 2.9rem;
            font-weight: 800;
            color: #f5c542;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .btn-gold {
            background: linear-gradient(95deg, #d4af37, #b8941e);
            border: none;
            padding: 15px;
            border-radius: 48px;
            font-weight: bold;
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .btn-gold:hover { transform: scale(0.97); background: linear-gradient(95deg, #c6a12e, #a57e18); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d4af37;
            padding: 15px;
            border-radius: 48px;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover { background: #d4af3715; }
        .modal-custom {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-custom-content {
            background: #1a1710;
            max-width: 94%;
            width: 480px;
            border-radius: 48px;
            padding: 32px;
            border-top: 4px solid #d4af37;
            box-shadow: 0 30px 50px black;
            text-align: center;
        }
        .modal-custom-content h3 {
            color: #d4af37;
            margin-bottom: 20px;
        }
        .modal-custom-content p {
            color: #e6d5a8;
            margin-bottom: 24px;
        }
        .modal-custom-content input, .modal-custom-content select {
            width: 100%;
            margin: 12px 0;
        }
        .admin-panel {
            background: #0e0c08;
            border-radius: 32px;
            padding: 22px;
            margin-top: 24px;
            border: 1px solid #d4af3740;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1b12;
            color: #ffdf9c;
            padding: 12px 28px;
            border-radius: 60px;
            border-left: 5px solid #d4af37;
            z-index: 3000;
            display: none;
            font-weight: bold;
            box-shadow: 0 8px 20px black;
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #d4af37;
            background: transparent;
            border: none;
            font-size: 1.1rem;
        }
        .camera-preview {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 12px 0;
        }
        .camera-preview video, .camera-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            margin: 10px 0;
        }
        .kyc-status {
            background: #1a1710;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .country-select {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: #2c271e;
            border: 1px solid #d4af3760;
            border-radius: 60px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .phone-container {
            display: flex;
            gap: 12px;
            margin: 8px 0;
        }
        .phone-code {
            width: 100px;
            padding: 14px 12px;
            background: #2c271e;
            border: 1px solid #d4af3760;
            border-radius: 60px;
            color: #d4af37;
            font-weight: bold;
            text-align: center;
        }
        .phone-number {
            flex: 1;
            padding: 14px 18px;
            background: #2c271e;
            border: 1px solid #d4af3760;
            border-radius: 60px;
            color: #fff;
        }
        @media (max-width: 500px) {
            .balance-amount { font-size: 2rem; }
            .phone-container { flex-direction: column; gap: 8px; }
            .phone-code { width: 100%; }
        }
    </style>
</head>
<body>
<div id="coinParticles"></div>
<div id="appRoot"></div>
<div id="toastMessage" class="toast"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: 'AIzaSyC90uEwso8ZP3s7tLvV_z88ZbUijXLOpPU',
        authDomain: 'project-73108ea9-d1b2-4ac3-8fb.firebaseapp.com',
        projectId: 'project-73108ea9-d1b2-4ac3-8fb',
        storageBucket: 'project-73108ea9-d1b2-4ac3-8fb.firebasestorage.app',
        messagingSenderId: '869497428830',
        appId: '1:869497428830:web:27ef20567761e7b0d3cdcf'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    // Inicializar EmailJS (substitua com suas credenciais)
    emailjs.init("YOUR_PUBLIC_KEY"); // Usuário deve substituir pela chave pública do EmailJS

    const ADMIN_EMAIL = "mamfilhos29@gmail.com";
    let exchangeRates = { AOA_USD: 0.00115, USD_AOA: 870, AOA_BRL: 0.0062, BRL_AOA: 161, USD_BRL: 5.35, BRL_USD: 0.187 };
    
    let currentUser = null;
    let currentCurrency = 'AOA';
    let userBalances = { AOA: 0, USD: 0, BRL: 0 };
    let cardActivated = false;
    let userCardData = null;
    
    const countriesWithCodes = [
        { name: "Angola", code: "+244" }, { name: "Brasil", code: "+55" }, { name: "Portugal", code: "+351" },
        { name: "Estados Unidos", code: "+1" }, { name: "Reino Unido", code: "+44" }, { name: "França", code: "+33" },
        { name: "Alemanha", code: "+49" }, { name: "Itália", code: "+39" }, { name: "Espanha", code: "+34" },
        { name: "Moçambique", code: "+258" }, { name: "Cabo Verde", code: "+238" }, { name: "São Tomé e Príncipe", code: "+239" }
    ];
    
    function createCoinParticles() {
        const container = document.getElementById('coinParticles');
        const coins = ['💰', '💵', '💶', '🪙', '💷', '💎'];
        for (let i = 0; i < 35; i++) {
            const particle = document.createElement('div');
            particle.className = 'coin-particle';
            particle.innerHTML = coins[Math.floor(Math.random() * coins.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 30 + 's';
            particle.style.animationDuration = 15 + Math.random() * 25 + 's';
            particle.style.fontSize = (20 + Math.random() * 40) + 'px';
            container.appendChild(particle);
        }
    }
    createCoinParticles();
    
    function showToast(msg) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }
    
    function showModal(title, message, onConfirm = null, showCancel = false) {
        const modal = document.createElement('div');
        modal.className = 'modal-custom';
        modal.innerHTML = `
            <div class="modal-custom-content">
                <h3><i class="fas fa-gem"></i> ${title}</h3>
                <p>${message}</p>
                <div style="display:flex; gap:12px; justify-content:center;">
                    ${showCancel ? '<button id="modalCancelBtn" class="btn-outline">Cancelar</button>' : ''}
                    <button id="modalConfirmBtn" class="btn-gold">OK</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        
        document.getElementById('modalConfirmBtn').onclick = () => {
            modal.remove();
            if (onConfirm) onConfirm();
        };
        if (showCancel) {
            document.getElementById('modalCancelBtn').onclick = () => modal.remove();
        }
    }
    
    function showPromptModal(title, placeholder, callback) {
        const modal = document.createElement('div');
        modal.className = 'modal-custom';
        modal.innerHTML = `
            <div class="modal-custom-content">
                <h3><i class="fas fa-envelope"></i> ${title}</h3>
                <input type="email" id="promptInput" placeholder="${placeholder}" style="width:100%; margin:12px 0;">
                <div style="display:flex; gap:12px; justify-content:center;">
                    <button id="promptCancelBtn" class="btn-outline">Cancelar</button>
                    <button id="promptConfirmBtn" class="btn-gold">Enviar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        
        document.getElementById('promptConfirmBtn').onclick = () => {
            const value = document.getElementById('promptInput').value;
            modal.remove();
            if (value && callback) callback(value);
        };
        document.getElementById('promptCancelBtn').onclick = () => modal.remove();
    }
    
    function formatMoney(value, currency) {
        if (isNaN(value)) value = 0;
        const opts = { style: 'currency', currency: currency, minimumFractionDigits: 2 };
        return new Intl.NumberFormat('pt-AO', opts).format(value);
    }
    
    function generateCardNumber() {
        let num = '';
        for (let i = 0; i < 16; i++) num += Math.floor(Math.random() * 10);
        return num.match(/.{4}/g).join(' ');
    }
    
    function generateCVV() { return Math.floor(100 + Math.random() * 900).toString(); }
    function generateExpiry() {
        const date = new Date();
        const year = date.getFullYear() + 5;
        const month = String(date.getMonth() + 1).padStart(2, '0');
        return `${month}/${year.toString().slice(-2)}`;
    }
    
    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            userBalances = { AOA: data.balances?.AOA ?? 0, USD: data.balances?.USD ?? 0, BRL: data.balances?.BRL ?? 0 };
            cardActivated = data.cardActivated || false;
            window.userKycStatus = data.kycStatus || (currentUser?.email === ADMIN_EMAIL ? 'approved' : 'pending');
            window.userCardData = data.cardData || null;
            window.userFullName = `${data.firstName || ''} ${data.lastName || ''}`;
        } else {
            userBalances = { AOA: 0, USD: 0, BRL: 0 };
            cardActivated = false;
            window.userKycStatus = currentUser?.email === ADMIN_EMAIL ? 'approved' : 'pending';
            window.userCardData = null;
        }
    }
    
    async function updateFirestoreBalances(uid) {
        await db.collection('users').doc(uid).update({ balances: userBalances });
    }
    
    async function uploadKYCFile(userId, file, type) {
        if (!file) return null;
        const ext = file.name.split('.').pop();
        const filename = `${userId}/${type}_${Date.now()}.${ext}`;
        const ref = storage.ref().child(`kyc/${filename}`);
        await ref.put(file);
        return await ref.getDownloadURL();
    }
    
    async function submitKYC(selfieFile, idFrontFile, idBackFile) {
        if (!selfieFile || !idFrontFile) { showModal('MAM Cash', 'Selfie e documento são obrigatórios'); return; }
        showToast('Enviando documentos...');
        const selfieUrl = await uploadKYCFile(currentUser.uid, selfieFile, 'selfie');
        const idFrontUrl = await uploadKYCFile(currentUser.uid, idFrontFile, 'id_front');
        let idBackUrl = null;
        if (idBackFile) idBackUrl = await uploadKYCFile(currentUser.uid, idBackFile, 'id_back');
        
        await db.collection('users').doc(currentUser.uid).update({
            kycStatus: 'pending_review',
            kycDocuments: { selfie: selfieUrl, idFront: idFrontUrl, idBack: idBackUrl },
            kycSubmittedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('Documentos enviados! Aguarde aprovação do ADMIN.');
        renderDashboard();
    }
    
    async function adminApproveKYC(userId, userEmail) {
        await db.collection('users').doc(userId).update({ kycStatus: 'approved' });
        
        // Enviar e-mail de ativação via EmailJS
        const templateParams = {
            to_email: userEmail,
            to_name: userEmail.split('@')[0],
            activation_link: `https://mamcash.com/activate/${userId}`
        };
        
        emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams).then(() => {
            showToast('E-mail de ativação enviado!');
        }).catch(() => {
            showToast('Usuário aprovado, mas falha no envio do e-mail.');
        });
        
        showToast('Identidade aprovada!');
        renderDashboard();
    }
    
    async function adminGenerateCard(userId) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        if (!userDoc.exists) return;
        const cardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: generateExpiry() };
        await userRef.update({ cardActivated: true, cardData: cardData });
        showToast(`Cartão gerado para ${userDoc.data().email}`);
        renderDashboard();
    }
    
    function forgotPassword() {
        showPromptModal('Recuperar Senha', 'Digite seu e-mail', (email) => {
            if (email && email.includes('@')) {
                auth.sendPasswordResetEmail(email).then(() => {
                    showModal('MAM Cash', `Link de recuperação enviado para ${email}`);
                }).catch(error => {
                    showModal('MAM Cash', 'Erro: ' + error.message);
                });
            } else {
                showModal('MAM Cash', 'E-mail inválido');
            }
        });
    }
    
    async function renderDashboard() {
        if (!currentUser) { renderLogin(); return; }
        await loadUserData(currentUser.uid);
        const isAdmin = (currentUser.email === ADMIN_EMAIL);
        const balanceNow = userBalances[currentCurrency] || 0;
        
        let cardStatusText = 'BLOQUEADO';
        let cardStatusClass = 'status-inactive';
        if (isAdmin || window.userKycStatus === 'approved') {
            if (!cardActivated && isAdmin) {
                const cardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: generateExpiry() };
                await db.collection('users').doc(currentUser.uid).update({ cardActivated: true, cardData: cardData });
                window.userCardData = cardData;
                cardActivated = true;
            }
            if (cardActivated) { cardStatusText = 'ATIVO • PREMIUM'; cardStatusClass = 'status-active'; }
            else if (window.userKycStatus === 'approved') cardStatusText = 'KYC APROVADO • AGUARDANDO CARTÃO';
        } else if (window.userKycStatus === 'pending_review') cardStatusText = 'KYC EM ANÁLISE';
        else cardStatusText = 'AGUARDANDO KYC';
        
        let html = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div><i class="fas fa-gem" style="color:#d4af37"></i> <span style="color:#e6d5a8;">${window.userFullName || currentUser.email}</span></div>
                <button id="logoutMainBtn" style="background:#222216; border:1px solid #d4af37; padding:8px 18px; border-radius:40px; color:#d4af37; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
            <div class="card-premium">
                <div class="card-status">
                    <span class="status-badge ${cardStatusClass}"><i class="fas ${cardActivated ? 'fa-check-circle' : 'fa-lock'}"></i> ${cardStatusText}</span>
                    <span><i class="fas fa-microchip"></i> MAM BLACK</span>
                </div>
                <div class="card-number">${window.userCardData ? window.userCardData.number : '****  ****  ****  ****'}</div>
                <div class="card-footer-row">
                    <span>Validade: ${window.userCardData ? window.userCardData.expiry : '**/**'}</span>
                    <span>CVV: ${window.userCardData ? window.userCardData.cvv : '***'}</span>
                </div>
            </div>`;
        
        if (!isAdmin && window.userKycStatus !== 'approved' && window.userKycStatus !== 'pending_review' && !cardActivated) {
            html += `<div class="kyc-status">
                        <h3 style="color:#d4af37;"><i class="fas fa-id-card"></i> Verificação de Identidade (KYC)</h3>
                        <p style="color:#b9a46b;">Para ativar seu cartão, complete a verificação enviando:</p>
                        <button id="openKycBtn" class="btn-gold" style="margin:15px auto;"><i class="fas fa-camera"></i> Enviar Selfie + Documento</button>
                    </div>`;
        }
        
        html += `
            <div class="currency-tabs">
                <button class="currency-btn ${currentCurrency === 'AOA' ? 'active' : ''}" data-cur="AOA"><i class="fas fa-coins"></i> Kwanza (AOA)</button>
                <button class="currency-btn ${currentCurrency === 'USD' ? 'active' : ''}" data-cur="USD"><i class="fas fa-dollar-sign"></i> USD</button>
                <button class="currency-btn ${currentCurrency === 'BRL' ? 'active' : ''}" data-cur="BRL"><i class="fas fa-real"></i> BRL</button>
            </div>
            <div class="balance-box">
                <div style="font-size:0.8rem; color:#d4af37;">Saldo disponível</div>
                <div class="balance-amount">${formatMoney(balanceNow, currentCurrency)}</div>
            </div>
            <div class="action-grid">
                <button id="btnTransfer" class="btn-gold"><i class="fas fa-exchange-alt"></i> Transferir</button>
                <button id="btnDeposit" class="btn-gold"><i class="fas fa-upload"></i> Depositar</button>
                <button id="btnExchange" class="btn-outline"><i class="fas fa-chart-line"></i> Câmbio</button>
            </div>`;
        
        if (isAdmin) {
            const usersSnap = await db.collection('users').get();
            let users = [];
            usersSnap.forEach(d => users.push({id: d.id, ...d.data()}));
            
            html += `<div class="admin-panel"><h3 style="color:#d4af37;"><i class="fas fa-crown"></i> Painel Administrador</h3>`;
            html += `<h4>👥 Usuários Pendentes de KYC</h4>`;
            const pendingUsers = users.filter(u => u.kycStatus === 'pending_review');
            if(pendingUsers.length === 0) html += `<p>Nenhum usuário aguardando verificação</p>`;
            for(const user of pendingUsers) {
                html += `<div style="border:1px solid #d4af37; border-radius:24px; padding:15px; margin:12px 0;">
                            <strong>${user.email}</strong><br>
                            ${user.kycDocuments?.selfie ? `<div><img src="${user.kycDocuments.selfie}" style="max-width:80px; border-radius:12px; margin:5px;"> Selfie</div>` : ''}
                            ${user.kycDocuments?.idFront ? `<div><img src="${user.kycDocuments.idFront}" style="max-width:80px; border-radius:12px; margin:5px;"> Documento</div>` : ''}
                            <button class="approveKycBtn" data-uid="${user.id}" data-email="${user.email}" style="background:#27ae60; border:none; padding:8px 20px; border-radius:40px; margin-top:10px;">✔ Aprovar Identidade</button>
                         </div>`;
            }
            html += `<h4 style="margin-top:20px;">💳 Usuários Aprovados sem Cartão</h4>`;
            const approvedNoCard = users.filter(u => u.kycStatus === 'approved' && !u.cardActivated && u.email !== ADMIN_EMAIL);
            for(const user of approvedNoCard) {
                html += `<div style="background:#1a1710; padding:12px; margin:8px 0; border-radius:20px;">
                            <div>👤 ${user.email}</div>
                            <button class="generateCardBtn" data-uid="${user.id}" style="background:#d4af37; border:none; padding:6px 18px; border-radius:40px;">💳 Gerar Cartão</button>
                         </div>`;
            }
            html += `</div>`;
        }
        document.getElementById('appRoot').innerHTML = html;
        
        document.querySelectorAll('.currency-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentCurrency = btn.getAttribute('data-cur'); renderDashboard(); });
        });
        document.getElementById('btnTransfer')?.addEventListener('click', () => openTransferModal());
        document.getElementById('btnDeposit')?.addEventListener('click', () => openDepositModal());
        document.getElementById('btnExchange')?.addEventListener('click', () => openExchangeModal());
        document.getElementById('logoutMainBtn')?.addEventListener('click', () => auth.signOut());
        document.getElementById('openKycBtn')?.addEventListener('click', () => openKycModal());
        
        if (isAdmin) {
            document.querySelectorAll('.approveKycBtn').forEach(btn => {
                btn.addEventListener('click', async () => { 
                    await adminApproveKYC(btn.getAttribute('data-uid'), btn.getAttribute('data-email')); 
                    renderDashboard(); 
                });
            });
            document.querySelectorAll('.generateCardBtn').forEach(btn => {
                btn.addEventListener('click', async () => { 
                    await adminGenerateCard(btn.getAttribute('data-uid')); 
                    renderDashboard(); 
                });
            });
        }
    }
    
    function openKycModal() {
        let stream = null;
        const modal = document.createElement('div'); modal.className = 'modal-custom';
        modal.innerHTML = `<div class="modal-custom-content"><h3><i class="fas fa-id-card"></i> Verificação de Identidade</h3>
            <p style="color:#d4af37;">Selfie com a câmera</p>
            <div class="camera-preview"><video id="cameraVideo" autoplay playsinline></video></div>
            <button id="captureSelfieBtn" class="btn-gold"><i class="fas fa-camera"></i> Tirar Selfie</button>
            <canvas id="selfieCanvas" style="display:none;"></canvas>
            <img id="selfiePreview" class="image-preview" style="display:none;">
            <p style="margin-top:15px;">Documento de Identidade (Frente)</p>
            <input type="file" id="idFrontInput" accept="image/*">
            <p>Documento Verso (opcional)</p>
            <input type="file" id="idBackInput" accept="image/*">
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="submitKycBtn" class="btn-gold">Enviar Verificação</button><button id="closeKycModal" class="btn-outline">Fechar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        
        const video = document.getElementById('cameraVideo');
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => { stream = s; video.srcObject = s; }).catch(e => showToast('Erro ao acessar câmera: ' + e.message));
        
        document.getElementById('captureSelfieBtn').onclick = () => {
            const canvas = document.getElementById('selfieCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imgPreview = document.getElementById('selfiePreview');
            imgPreview.src = canvas.toDataURL('image/jpeg');
            imgPreview.style.display = 'block';
            showToast('Selfie capturada!');
        };
        document.getElementById('submitKycBtn').onclick = async () => {
            const canvas = document.getElementById('selfieCanvas');
            if (!canvas.width) { showModal('MAM Cash', 'Tire uma selfie primeiro'); return; }
            const selfieBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
            const selfieFile = new File([selfieBlob], 'selfie.jpg', { type: 'image/jpeg' });
            const idFrontFile = document.getElementById('idFrontInput').files[0];
            if (!idFrontFile) { showModal('MAM Cash', 'Selecione o documento de identificação'); return; }
            const idBackFile = document.getElementById('idBackInput').files[0];
            await submitKYC(selfieFile, idFrontFile, idBackFile);
            if(stream) stream.getTracks().forEach(track => track.stop());
            modal.remove();
        };
        document.getElementById('closeKycModal').onclick = () => { if(stream) stream.getTracks().forEach(track => track.stop()); modal.remove(); };
    }
    
    async function openTransferModal() { showModal('MAM Cash', 'Função em desenvolvimento'); }
    async function openDepositModal() { showModal('MAM Cash', 'Função em desenvolvimento'); }
    async function openExchangeModal() { showModal('MAM Cash', 'Função em desenvolvimento'); }
    
    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:460px; margin: 10vh auto; background:#12100b; border-radius:56px; padding:38px 28px; border:1px solid #d4af37;">
                <div style="text-align:center;"><i class="fas fa-coins" style="font-size:3rem; color:#d4af37;"></i><h2 style="color:#d4af37;">MAM CASH</h2></div>
                <input id="loginEmail" placeholder="Email" style="width:100%; margin:12px 0;">
                <div class="password-wrapper"><input id="loginPassword" type="password" placeholder="Senha"><button type="button" id="toggleLoginPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <button id="doLogin" class="btn-gold" style="width:100%; margin-top:16px;">Entrar</button>
                <button id="goToRegister" class="btn-outline" style="width:100%; margin-top:12px;">Criar Conta</button>
                <div id="forgotPasswordBtn" style="text-align:center; margin-top:16px; cursor:pointer; color:#d4af37;"><i class="fas fa-key"></i> Esqueci minha senha</div>
            </div>`;
        
        document.getElementById('toggleLoginPass')?.addEventListener('click', () => { const inp = document.getElementById('loginPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('forgotPasswordBtn')?.addEventListener('click', () => forgotPassword());
        document.getElementById('doLogin').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if(!email || !password) { showModal('MAM Cash', 'Preencha email e senha'); return; }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                showToast('Login realizado com sucesso!');
                renderDashboard();
            } catch(e) { showModal('MAM Cash', e.message); }
        };
        document.getElementById('goToRegister').onclick = () => renderRegister();
    }
    
    function renderRegister() {
        let countryOptions = countriesWithCodes.map(c => `<option value="${c.name}" ${c.name === 'Angola' ? 'selected' : ''}>${c.name} (${c.code})</option>`).join('');
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:480px; margin: 3vh auto; background:#12100b; border-radius:56px; padding:32px 28px; border:1px solid #d4af37;">
                <h2 style="color:#d4af37; text-align:center;">Criar Conta MAM Cash</h2>
                <input id="regFirstName" placeholder="Nome">
                <input id="regLastName" placeholder="Sobrenome">
                <input id="regEmail" placeholder="Email">
                <select id="regCountry" class="country-select">${countryOptions}</select>
                <div class="phone-container">
                    <span id="phoneCode" class="phone-code">+244</span>
                    <input id="regPhone" class="phone-number" placeholder="999 999 999">
                </div>
                <div class="password-wrapper"><input id="regPassword" type="password" placeholder="Senha (min 6)"><button type="button" id="toggleRegPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <div class="password-wrapper"><input id="regConfirmPassword" type="password" placeholder="Confirmar Senha"><button type="button" id="toggleRegConfirm" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <button id="doRegisterFinal" class="btn-gold" style="width:100%; margin-top:16px;">Registrar</button>
                <button id="backToLoginFromReg" class="btn-outline" style="width:100%; margin-top:12px;">Voltar ao Login</button>
            </div>`;
        
        document.getElementById('toggleRegPass')?.addEventListener('click', () => { const inp = document.getElementById('regPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('toggleRegConfirm')?.addEventListener('click', () => { const inp = document.getElementById('regConfirmPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        
        document.getElementById('regCountry').addEventListener('change', () => {
            const selected = countriesWithCodes.find(c => c.name === document.getElementById('regCountry').value);
            if (selected) document.getElementById('phoneCode').textContent = selected.code;
        });
        
        document.getElementById('doRegisterFinal').onclick = async () => {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const country = document.getElementById('regCountry').value;
            const phoneCode = document.getElementById('phoneCode').textContent;
            const phoneNumber = document.getElementById('regPhone').value;
            const fullPhone = `${phoneCode} ${phoneNumber}`;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if(!firstName || !lastName || !email || !phoneNumber || !password) { showModal('MAM Cash', 'Preencha todos os campos'); return; }
            if(password !== confirm) { showModal('MAM Cash', 'Senhas não coincidem'); return; }
            if(password.length < 6) { showModal('MAM Cash', 'Senha mínima 6 caracteres'); return; }
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCred.user.uid).set({
                    firstName, lastName, email, country, phone: fullPhone,
                    balances: { AOA: 0, USD: 0, BRL: 0 },
                    cardActivated: false, kycStatus: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showModal('MAM Cash', 'Conta criada! Complete a verificação KYC no dashboard.');
                renderLogin();
            } catch(e) { showModal('MAM Cash', e.message); }
        };
        document.getElementById('backToLoginFromReg').onclick = () => renderLogin();
    }
    
    auth.onAuthStateChanged(async user => {
        if(user) { currentUser = user; await renderDashboard(); }
        else { currentUser = null; renderLogin(); }
    });
</script>
</body>
</html>
