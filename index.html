<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAM Cash • Fintech Premium</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            color: #ffffff;
        }

        /* Header Fixo */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #000000;
            border-bottom: 2px solid #d4af37;
            padding: 16px 24px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            width: 40px;
            height: 40px;
        }

        .logo span {
            font-size: 1.5rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 1px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-email {
            color: #d4af37;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #d4af37;
            padding: 8px 16px;
            border-radius: 30px;
            color: #d4af37;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #d4af37;
            color: #000;
        }

        /* Container Principal */
        .container {
            max-width: 700px;
            margin: 100px auto 80px;
            padding: 0 20px;
        }

        /* Cartão Premium */
        .card-container {
            background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .card-container::before {
            content: "";
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .card-chip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .chip-icon {
            font-size: 2.5rem;
            color: #d4af37;
        }

        .contactless {
            font-size: 1.2rem;
            color: #d4af37;
        }

        .card-number {
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            letter-spacing: 4px;
            color: #d4af37;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .card-details {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-holder, .card-expiry {
            flex: 1;
        }

        .card-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 1rem;
            color: #fff;
            font-weight: 600;
            margin-top: 5px;
        }

        .card-brand {
            text-align: right;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d4af37;
            font-family: serif;
        }

        /* Tabs Moedas */
        .currency-tabs {
            display: flex;
            gap: 12px;
            background: #111111;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 25px;
            border: 1px solid #d4af37;
        }

        .currency-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            border-radius: 50px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .currency-btn.active {
            background: #d4af37;
            color: #000;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        /* Saldo */
        .balance-card {
            background: #111111;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid #d4af37;
        }

        .balance-label {
            font-size: 0.85rem;
            color: #d4af37;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .balance-value {
            font-size: 3rem;
            font-weight: 800;
            color: #d4af37;
        }

        /* Botões Ação */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-action {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 1px solid #d4af37;
            padding: 16px;
            border-radius: 50px;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-action:hover {
            background: #d4af37;
            color: #000;
            transform: translateY(-2px);
        }

        /* Contas Vinculadas */
        .linked-section {
            background: #111111;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #d4af37;
        }

        .linked-title {
            color: #d4af37;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .linked-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .linked-item:last-child {
            border-bottom: none;
        }

        .linked-label {
            color: #888;
        }

        .linked-value {
            color: #fff;
        }

        .edit-link {
            color: #d4af37;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Admin Panel */
        .admin-panel {
            background: #111111;
            border-radius: 24px;
            padding: 20px;
            margin-top: 25px;
            border: 1px solid #d4af37;
        }

        .admin-title {
            color: #d4af37;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .admin-section {
            margin-bottom: 25px;
        }

        .admin-section h4 {
            color: #d4af37;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .kyc-item, .card-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #d4af37;
        }

        .kyc-item p, .card-item p {
            color: #fff;
            margin-bottom: 10px;
        }

        .btn-approve {
            background: #2ecc71;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: #111111;
            width: 90%;
            max-width: 450px;
            border-radius: 32px;
            padding: 30px;
            border-top: 4px solid #d4af37;
        }

        .modal-content h3 {
            color: #d4af37;
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-modal-confirm {
            flex: 1;
            background: #d4af37;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-modal-cancel {
            flex: 1;
            background: transparent;
            border: 1px solid #d4af37;
            padding: 12px;
            border-radius: 30px;
            color: #d4af37;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #d4af37;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 3000;
            display: none;
            font-weight: bold;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000000;
            border-top: 1px solid #d4af37;
            padding: 12px;
            text-align: center;
            font-size: 0.75rem;
            color: #d4af37;
            z-index: 1000;
        }

        /* Login/Registro */
        .auth-container {
            max-width: 450px;
            margin: 120px auto;
            background: #111111;
            border-radius: 32px;
            padding: 40px 30px;
            border: 1px solid #d4af37;
        }

        .auth-title {
            text-align: center;
            color: #d4af37;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 30px;
            color: #fff;
        }

        .auth-btn {
            width: 100%;
            background: #d4af37;
            border: none;
            padding: 14px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .auth-link {
            text-align: center;
            margin-top: 15px;
            color: #d4af37;
            cursor: pointer;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #d4af37;
            background: transparent;
            border: none;
        }

        .forgot-pass {
            text-align: center;
            margin-top: 12px;
            color: #d4af37;
            cursor: pointer;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="header" id="header" style="display: none;">
    <div class="logo">
        <img src="https://img.icons8.com/fluency/48/000000/shield.png" alt="logo">
        <span>MAM Cash</span>
    </div>
    <div class="user-info">
        <span class="user-email" id="userEmail"></span>
        <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>
</div>

<div id="appRoot"></div>
<div id="toastMessage" class="toast"></div>
<div class="footer">from: MAM & Filhos (Matias Arsénio Manuel)</div>

<script>
    const firebaseConfig = {
        apiKey: 'AIzaSyC90uEwso8ZP3s7tLvV_z88ZbUijXLOpPU',
        authDomain: 'project-73108ea9-d1b2-4ac3-8fb.firebaseapp.com',
        projectId: 'project-73108ea9-d1b2-4ac3-8fb',
        storageBucket: 'project-73108ea9-d1b2-4ac3-8fb.firebasestorage.app',
        messagingSenderId: '869497428830',
        appId: '1:869497428830:web:27ef20567761e7b0d3cdcf'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADMIN_EMAIL = "mamfilhos29@gmail.com";
    let currentUser = null;
    let currentCurrency = 'AOA';
    let userBalances = { AOA: 0, USD: 0, BRL: 0 };
    let cardActivated = false;
    let userCardData = null;
    let exchangeRateUSD = 830; // 1 USD = 830 AOA

    function showToast(msg) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function formatMoney(value, currency) {
        if (isNaN(value)) value = 0;
        if (currency === 'AOA') return value.toLocaleString('pt-AO') + ' Kz';
        if (currency === 'USD') return '$ ' + value.toFixed(2);
        if (currency === 'BRL') return 'R$ ' + value.toFixed(2);
        return value;
    }

    function generateCardNumber() {
        let num = '';
        for (let i = 0; i < 16; i++) num += Math.floor(Math.random() * 10);
        return num.match(/.{4}/g).join(' ');
    }

    function generateCVV() {
        return Math.floor(100 + Math.random() * 900).toString();
    }

    function generateExpiry() {
        const date = new Date();
        const year = date.getFullYear() + 5;
        const month = String(date.getMonth() + 1).padStart(2, '0');
        return `${month}/${year.toString().slice(-2)}`;
    }

    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            userBalances = { AOA: data.balances?.AOA || 0, USD: data.balances?.USD || 0, BRL: data.balances?.BRL || 0 };
            cardActivated = data.cardActivated || false;
            userCardData = data.cardData || null;
        } else {
            userBalances = { AOA: 0, USD: 0, BRL: 0 };
            cardActivated = false;
            await db.collection('users').doc(uid).set({
                email: currentUser.email,
                balances: { AOA: 0, USD: 0, BRL: 0 },
                cardActivated: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }

    async function updateBalances() {
        await db.collection('users').doc(currentUser.uid).update({ balances: userBalances });
    }

    async function requestCardActivation() {
        if (cardActivated) { showToast('Cartão já está ativo'); return; }
        if (userBalances.AOA < 5000 && currentUser.email !== ADMIN_EMAIL) {
            showToast(`Saldo insuficiente. Taxa: ${formatMoney(5000, 'AOA')}`);
            return;
        }
        if (currentUser.email === ADMIN_EMAIL) {
            const cardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: generateExpiry() };
            await db.collection('users').doc(currentUser.uid).update({ cardActivated: true, cardData: cardData });
            cardActivated = true;
            userCardData = cardData;
            showToast('✨ Cartão ADMIN gerado com sucesso!');
            renderDashboard();
            return;
        }
        await db.collection('cardRequests').add({
            userId: currentUser.uid,
            userEmail: currentUser.email,
            status: 'pending',
            fee: 5000,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('✅ Pedido enviado ao administrador.');
    }

    async function adminApproveCard(userId, fee) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        const balances = userDoc.data().balances;
        if (balances.AOA < fee) { showToast('Saldo insuficiente'); return; }
        balances.AOA -= fee;
        const cardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: generateExpiry() };
        await userRef.update({ balances: balances, cardActivated: true, cardData: cardData });
        await db.collection('cardRequests').where('userId', '==', userId).where('status', '==', 'pending').get()
            .then(snap => snap.forEach(doc => doc.ref.update({ status: 'approved' })));
        showToast(`✅ Cartão aprovado para ${userDoc.data().email}`);
        if (currentUser && currentUser.uid === userId) {
            userBalances = balances;
            cardActivated = true;
            userCardData = cardData;
            renderDashboard();
        }
    }

    async function exchangeCurrency(from, to, amount) {
        if (amount <= 0 || isNaN(amount)) return false;
        if (userBalances[from] < amount) { showToast(`Saldo insuficiente em ${from}`); return false; }
        
        let converted = 0;
        if (from === 'AOA' && to === 'USD') converted = amount / exchangeRateUSD;
        else if (from === 'USD' && to === 'AOA') converted = amount * exchangeRateUSD;
        else if (from === 'AOA' && to === 'BRL') converted = amount / 160;
        else if (from === 'BRL' && to === 'AOA') converted = amount * 160;
        else if (from === 'USD' && to === 'BRL') converted = amount * 5.3;
        else if (from === 'BRL' && to === 'USD') converted = amount / 5.3;
        else { showToast('Par não suportado'); return false; }
        
        userBalances[from] -= amount;
        userBalances[to] += converted;
        await updateBalances();
        showToast(`✅ Convertido: ${formatMoney(amount, from)} → ${formatMoney(converted, to)}`);
        renderDashboard();
        return true;
    }

    async function transferMoney(email, amount, currency) {
        if (!email || amount <= 0) return false;
        if (userBalances[currency] < amount) { showToast('Saldo insuficiente'); return false; }
        const usersSnap = await db.collection('users').where('email', '==', email).get();
        if (usersSnap.empty) { showToast('Destinatário não encontrado'); return false; }
        const targetUser = usersSnap.docs[0];
        const targetBalances = targetUser.data().balances;
        targetBalances[currency] = (targetBalances[currency] || 0) + amount;
        userBalances[currency] -= amount;
        await db.collection('users').doc(targetUser.id).update({ balances: targetBalances });
        await updateBalances();
        showToast(`✅ Transferência de ${formatMoney(amount, currency)} enviada para ${email}`);
        renderDashboard();
        return true;
    }

    async function renderDashboard() {
        if (!currentUser) { renderLogin(); return; }
        await loadUserData(currentUser.uid);
        const isAdmin = currentUser.email === ADMIN_EMAIL;
        const balanceNow = userBalances[currentCurrency] || 0;
        
        let html = `
            <div class="container">
                <div class="card-container">
                    <div class="card-chip">
                        <div class="chip-icon"><i class="fas fa-microchip"></i></div>
                        <div class="contactless"><i class="fas fa-wifi"></i></div>
                    </div>
                    <div class="card-number">${userCardData ? userCardData.number : '****  ****  ****  ****'}</div>
                    <div class="card-details">
                        <div class="card-holder">
                            <div class="card-label">Titular</div>
                            <div class="card-value">MATIAS ARSÉNIO MANUEL</div>
                        </div>
                        <div class="card-expiry">
                            <div class="card-label">Validade</div>
                            <div class="card-value">${userCardData ? userCardData.expiry : '**/**'}</div>
                        </div>
                        <div class="card-expiry">
                            <div class="card-label">CVV</div>
                            <div class="card-value">${userCardData ? userCardData.cvv : '***'}</div>
                        </div>
                    </div>
                    <div class="card-brand">
                        <i class="fab fa-cc-mastercard"></i> MASTERCARD
                    </div>
                </div>

                <div class="currency-tabs">
                    <button class="currency-btn ${currentCurrency === 'AOA' ? 'active' : ''}" data-cur="AOA"><i class="fas fa-coins"></i> Kwanza (AOA)</button>
                    <button class="currency-btn ${currentCurrency === 'USD' ? 'active' : ''}" data-cur="USD"><i class="fas fa-dollar-sign"></i> USD</button>
                    <button class="currency-btn ${currentCurrency === 'BRL' ? 'active' : ''}" data-cur="BRL"><i class="fas fa-real"></i> BRL</button>
                </div>

                <div class="balance-card">
                    <div class="balance-label">SALDO DISPONÍVEL</div>
                    <div class="balance-value">${formatMoney(balanceNow, currentCurrency)}</div>
                </div>

                <div class="action-buttons">
                    <button class="btn-action" id="transferBtn"><i class="fas fa-exchange-alt"></i> Transferir</button>
                    <button class="btn-action" id="depositBtn"><i class="fas fa-upload"></i> Depositar</button>
                    <button class="btn-action" id="exchangeBtn"><i class="fas fa-chart-line"></i> Câmbio</button>
                </div>

                <div class="linked-section">
                    <div class="linked-title"><i class="fas fa-link"></i> Contas Vinculadas</div>
                    <div class="linked-item">
                        <span class="linked-label">🏦 IBAN Angola:</span>
                        <span class="linked-value">AO06 0000 0000 0000 0000 0000 0</span>
                    </div>
                    <div class="linked-item">
                        <span class="linked-label">📧 PayPal:</span>
                        <span class="linked-value">${currentUser.email}</span>
                    </div>
                </div>
        `;

        if (!cardActivated && currentUser.email !== ADMIN_EMAIL) {
            html += `<button id="buyCardBtn" class="btn-action" style="width:100%; margin-bottom:20px;"><i class="fas fa-credit-card"></i> Solicitar Cartão (5.000 Kz)</button>`;
        }

        if (isAdmin) {
            const pendingCardsSnap = await db.collection('cardRequests').where('status', '==', 'pending').get();
            let pendingCards = [];
            pendingCardsSnap.forEach(d => pendingCards.push({ id: d.id, ...d.data() }));
            
            html += `<div class="admin-panel">
                        <div class="admin-title"><i class="fas fa-crown"></i> Painel Administrador</div>
                        <div class="admin-section">
                            <h4>💳 Pedidos de Cartão Pendentes</h4>`;
            if (pendingCards.length === 0) {
                html += `<p style="color:#fff;">Nenhum pedido pendente</p>`;
            } else {
                pendingCards.forEach(card => {
                    html += `<div class="card-item">
                                <p><strong>${card.userEmail}</strong> - Taxa: 5.000 Kz</p>
                                <button class="btn-approve" data-uid="${card.userId}" data-fee="5000">Aprovar Cartão</button>
                            </div>`;
                });
            }
            html += `</div></div>`;
        }

        html += `</div>`;
        document.getElementById('appRoot').innerHTML = html;
        document.getElementById('header').style.display = 'flex';
        document.getElementById('userEmail').innerText = currentUser.email;

        document.querySelectorAll('.currency-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentCurrency = btn.getAttribute('data-cur'); renderDashboard(); });
        });

        document.getElementById('transferBtn')?.addEventListener('click', openTransferModal);
        document.getElementById('depositBtn')?.addEventListener('click', openDepositModal);
        document.getElementById('exchangeBtn')?.addEventListener('click', openExchangeModal);
        document.getElementById('buyCardBtn')?.addEventListener('click', requestCardActivation);
        document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());

        if (isAdmin) {
            document.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await adminApproveCard(btn.getAttribute('data-uid'), parseFloat(btn.getAttribute('data-fee')));
                    renderDashboard();
                });
            });
        }
    }

    function openTransferModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-paper-plane"></i> Transferir</h3>
                <input id="transferEmail" placeholder="Email do destinatário">
                <input id="transferAmount" type="number" placeholder="Valor">
                <select id="transferCurrency">
                    <option value="AOA">Kwanza (AOA)</option>
                    <option value="USD">Dólar (USD)</option>
                    <option value="BRL">Real (BRL)</option>
                </select>
                <div class="modal-buttons">
                    <button id="confirmTransfer" class="btn-modal-confirm">Enviar</button>
                    <button id="closeModal" class="btn-modal-cancel">Cancelar</button>
                </div>
            </div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        document.getElementById('confirmTransfer').onclick = async () => {
            const email = document.getElementById('transferEmail').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const currency = document.getElementById('transferCurrency').value;
            await transferMoney(email, amount, currency);
            modal.remove();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    function openDepositModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-university"></i> Solicitar Depósito</h3>
                <p style="color:#fff; margin-bottom:10px;">IBAN: AO06 0000 0000 0000 0000 0000 0</p>
                <p style="color:#fff; margin-bottom:20px;">Envie o comprovativo para aprovação do ADMIN</p>
                <input id="depositAmount" type="number" placeholder="Valor">
                <select id="depositCurrency">
                    <option value="AOA">Kwanza (AOA)</option>
                    <option value="USD">Dólar (USD)</option>
                    <option value="BRL">Real (BRL)</option>
                </select>
                <textarea id="depositProof" placeholder="Código do comprovativo" style="width:100%; padding:14px; background:#1a1a1a; border:1px solid #d4af37; border-radius:30px; color:#fff; margin:10px 0;"></textarea>
                <div class="modal-buttons">
                    <button id="sendDeposit" class="btn-modal-confirm">Enviar Solicitação</button>
                    <button id="closeDeposit" class="btn-modal-cancel">Cancelar</button>
                </div>
            </div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        document.getElementById('sendDeposit').onclick = async () => {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const currency = document.getElementById('depositCurrency').value;
            const proof = document.getElementById('depositProof').value;
            if (isNaN(amount) || amount <= 0) { showToast('Valor inválido'); return; }
            await db.collection('deposits').add({
                userId: currentUser.uid, userEmail: currentUser.email, amount, currency, proof,
                status: 'pending', timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`✅ Solicitação de depósito de ${formatMoney(amount, currency)} enviada`);
            modal.remove();
        };
        document.getElementById('closeDeposit').onclick = () => modal.remove();
    }

    function openExchangeModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-chart-line"></i> Câmbio (USD = ${exchangeRateUSD} AOA)</h3>
                <select id="fromCurrency">
                    <option value="AOA">Kwanza (AOA)</option>
                    <option value="USD">Dólar (USD)</option>
                    <option value="BRL">Real (BRL)</option>
                </select>
                <select id="toCurrency">
                    <option value="USD">Dólar (USD)</option>
                    <option value="AOA">Kwanza (AOA)</option>
                    <option value="BRL">Real (BRL)</option>
                </select>
                <input id="exchangeAmount" type="number" placeholder="Montante a converter">
                <div class="modal-buttons">
                    <button id="doExchange" class="btn-modal-confirm">Converter</button>
                    <button id="closeExchange" class="btn-modal-cancel">Cancelar</button>
                </div>
            </div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        document.getElementById('doExchange').onclick = async () => {
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;
            const amount = parseFloat(document.getElementById('exchangeAmount').value);
            await exchangeCurrency(from, to, amount);
            modal.remove();
        };
        document.getElementById('closeExchange').onclick = () => modal.remove();
    }

    function renderLogin() {
        document.getElementById('header').style.display = 'none';
        document.getElementById('appRoot').innerHTML = `
            <div class="auth-container">
                <div class="auth-title"><i class="fas fa-shield-alt"></i> MAM Cash</div>
                <div id="loginView">
                    <input class="auth-input" id="loginEmail" placeholder="Email">
                    <div class="password-wrapper">
                        <input class="auth-input" id="loginPassword" type="password" placeholder="Senha">
                        <button class="toggle-pass" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
                    </div>
                    <button class="auth-btn" id="doLogin">Entrar</button>
                    <div class="forgot-pass" id="forgotPassBtn">Esqueci minha senha</div>
                    <div class="auth-link" id="goToRegister">Criar Conta</div>
                </div>
                <div id="registerView" style="display:none;">
                    <input class="auth-input" id="regName" placeholder="Nome Completo">
                    <input class="auth-input" id="regEmail" placeholder="Email">
                    <div class="password-wrapper">
                        <input class="auth-input" id="regPassword" type="password" placeholder="Senha (min 6)">
                        <button class="toggle-pass" onclick="togglePassword('regPassword')"><i class="fas fa-eye"></i></button>
                    </div>
                    <button class="auth-btn" id="doRegister">Registrar</button>
                    <div class="auth-link" id="backToLogin">Voltar ao Login</div>
                </div>
            </div>`;
        
        window.togglePassword = (id) => {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        };
        
        document.getElementById('doLogin').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                showToast('Login efetuado!');
                renderDashboard();
            } catch(e) { showToast(e.message); }
        };
        document.getElementById('forgotPassBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            if (!email) { showToast('Digite seu email'); return; }
            auth.sendPasswordResetEmail(email).then(() => showToast('Email de recuperação enviado!')).catch(e => showToast(e.message));
        };
        document.getElementById('goToRegister').onclick = () => {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('registerView').style.display = 'block';
        };
        document.getElementById('backToLogin').onclick = () => {
            document.getElementById('registerView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
        };
        document.getElementById('doRegister').onclick = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if (!name || !email || password.length < 6) { showToast('Preencha todos os campos e senha com 6+ caracteres'); return; }
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCred.user.uid).set({
                    name, email, balances: { AOA: 0, USD: 0, BRL: 0 }, cardActivated: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Conta criada com sucesso!');
                renderDashboard();
            } catch(e) { showToast(e.message); }
        };
    }

    auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) renderDashboard();
        else renderLogin();
    });
</script>
</body>
</html>
