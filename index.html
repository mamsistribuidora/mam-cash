<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAM Cash • Cartão Visa | Multicaixa Express</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0f0a 0%, #0c0b05 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
        }
        .app-container { max-width: 780px; margin: 0 auto; }
        
        /* CARTÃO VISA */
        .visa-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.3);
            position: relative;
            overflow: hidden;
        }
        .visa-card::before { content: "🦌"; position: absolute; bottom: -20px; right: -10px; font-size: 100px; opacity: 0.1; }
        .card-brand { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .visa-logo { font-size: 1.6rem; font-weight: 700; color: white; letter-spacing: 2px; }
        .card-chip { width: 45px; height: 35px; background: linear-gradient(135deg, #d4af37, #b8941e); border-radius: 8px; margin-bottom: 20px; }
        .card-number-display { font-size: 1.4rem; letter-spacing: 3px; font-weight: 600; margin-bottom: 25px; font-family: monospace; color: white; }
        .card-details-row { display: flex; gap: 40px; margin-bottom: 20px; }
        .card-detail-label { font-size: 0.6rem; opacity: 0.8; color: #ddd; letter-spacing: 1px; }
        .card-detail-value { font-size: 0.9rem; font-weight: 600; font-family: monospace; color: white; }
        .toggle-card-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        /* Moedas */
        .currency-tabs {
            display: flex;
            gap: 12px;
            background: #12100c;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid #3a321c;
        }
        .currency-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            border-radius: 50px;
            font-weight: bold;
            color: #d4af37;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .currency-btn.active { background: #d4af37; color: #0a0a0a; }
        
        .balance-box {
            background: linear-gradient(145deg, #0e0c07, #080703);
            border-radius: 28px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #d4af3740;
        }
        .balance-box div, .balance-box .balance-amount { color: #f5c542; }
        .balance-amount { font-size: 2.9rem; font-weight: 800; }
        
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .btn-gold {
            background: linear-gradient(95deg, #d4af37, #b8941e);
            border: none;
            padding: 15px;
            border-radius: 48px;
            font-weight: bold;
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d4af37;
            padding: 15px;
            border-radius: 48px;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* Seções de configuração */
        .settings-section {
            background: #12100b;
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid #2a2416;
        }
        .settings-title { color: #d4af37; margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .settings-section label { color: #d4af37; display: block; margin-bottom: 5px; font-size: 0.85rem; }
        .settings-section input, .settings-section select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #2c271e;
            border: 1px solid #d4af3760;
            border-radius: 60px;
            color: white;
        }
        .settings-section input::placeholder { color: #b9a46b; }
        .info-text { color: #b9a46b; font-size: 0.75rem; margin-top: 5px; }
        
        .admin-panel {
            background: #0e0c08;
            border-radius: 28px;
            padding: 22px;
            margin-top: 20px;
            border: 2px solid #d4af37;
        }
        .admin-title { color: #d4af37; margin-bottom: 20px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .admin-panel h4 { color: #d4af37; margin-bottom: 10px; margin-top: 15px; }
        .admin-panel p, .admin-panel div { color: #e6d5a8; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1710;
            max-width: 94%;
            width: 500px;
            border-radius: 48px;
            padding: 32px;
            border-top: 4px solid #d4af37;
        }
        .modal-content h3, .modal-content p { color: #d4af37; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #2c271e;
            border: 1px solid #d4af3760;
            border-radius: 60px;
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1b12;
            color: #ffdf9c;
            padding: 12px 28px;
            border-radius: 60px;
            border-left: 5px solid #d4af37;
            z-index: 3000;
            display: none;
            font-weight: bold;
        }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px; width: 100%; padding: 14px; background: #2c271e; border: 1px solid #d4af3760; border-radius: 60px; color: white; }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #d4af37;
            background: transparent;
            border: none;
        }
        
        .phone-group { display: flex; gap: 12px; margin: 12px 0; }
        .country-code-select { width: 120px; padding: 14px 8px; background: #2c271e; border-radius: 60px; color: #d4af37; }
        .phone-input { flex: 1; padding: 14px; background: #2c271e; border-radius: 60px; color: white; }
        
        .user-card-admin {
            background: #1a1710;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #d4af37;
            color: #e6d5a8;
        }
        .user-card-admin strong { color: #d4af37; }
        
        .multicaixa-btn {
            background: linear-gradient(95deg, #27ae60, #2ecc71);
            border: none;
            padding: 15px;
            border-radius: 48px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        @media (max-width: 500px) {
            .balance-amount { font-size: 2rem; }
            .action-grid { grid-template-columns: repeat(2, 1fr); }
            .phone-group { flex-direction: column; }
            .country-code-select { width: 100%; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>
<div id="toastMessage" class="toast"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: 'AIzaSyC90uEwso8ZP3s7tLvV_z88ZbUijXLOpPU',
        authDomain: 'project-73108ea9-d1b2-4ac3-8fb.firebaseapp.com',
        projectId: 'project-73108ea9-d1b2-4ac3-8fb',
        storageBucket: 'project-73108ea9-d1b2-4ac3-8fb.firebasestorage.app',
        messagingSenderId: '869497428830',
        appId: '1:869497428830:web:27ef20567761e7b0d3cdcf'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    emailjs.init("vuAVZ5U4lRBZcsIon");

    // ADMIN CREDENCIAIS
    const ADMIN_EMAIL = "mamfilhos29@gmail.com";
    const ADMIN_PHONE = "+244 937881307";
    const ADMIN_PASSWORD = "Angell28";

    let currentUser = null;
    let currentCurrency = 'AOA';
    let userBalances = { AOA: 15000, USD: 0, BRL: 0 };
    let userCardData = { number: "4532 1234 5678 9012", cvv: "123", expiry: "05/31" };
    let isCardVisible = false;
    let pending2FACode = null;
    let pending2FAType = null;
    let pendingUserEmail = null;
    let pendingUserPassword = null;
    let isAdminMode = false;
    
    // Dados bancários do usuário
    let userBankData = { iban: "", bankName: "", paypalEmail: "" };

    const countryCodes = [
        { code: "+244", country: "Angola" }, { code: "+55", country: "Brasil" }, { code: "+351", country: "Portugal" },
        { code: "+1", country: "EUA" }, { code: "+44", country: "Reino Unido" }, { code: "+33", country: "França" },
        { code: "+258", country: "Moçambique" }, { code: "+238", country: "Cabo Verde" }
    ];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#2c1a1a' : '#1f1b12';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    function formatMoney(value, currency) {
        if (isNaN(value)) value = 0;
        return new Intl.NumberFormat('pt-AO', { style: 'currency', currency: currency }).format(value);
    }

    function generate2FACode() { return Math.floor(1000 + Math.random() * 9000).toString(); }

    async function sendCodeByEmail(email, code) {
        try {
            const templateParams = { to_email: email, code: code, message: `Seu código de verificação MAM Cash é: ${code}` };
            await emailjs.send('default_service', 'template_mam_cash', templateParams);
            return true;
        } catch (error) { return false; }
    }

    async function send2FACode(email, phone, method) {
        const code = generate2FACode();
        pending2FACode = code;
        pending2FAType = method;
        if (method === 'email') {
            const sent = await sendCodeByEmail(email, code);
            if (!sent) showToast(`📧 Código de teste: ${code}`, false);
        } else {
            showToast(`📱 Código SMS: ${code}`, false);
        }
        return code;
    }

    // Carregar dados do usuário
    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            userBalances = data.balances || { AOA: 0, USD: 0, BRL: 0 };
            userBankData = { iban: data.iban || "", bankName: data.bankName || "", paypalEmail: data.paypalEmail || "" };
        }
    }

    // Salvar dados bancários
    async function saveBankData(iban, bankName, paypalEmail) {
        await db.collection('users').doc(currentUser.uid).update({ iban, bankName, paypalEmail });
        userBankData = { iban, bankName, paypalEmail };
        showToast('✅ Dados bancários salvos com sucesso!', false);
        renderDashboard();
    }

    // Carregar cartão via Multicaixa Express
    async function loadViaMulticaixa(amount) {
        if (amount <= 0) { showToast('Valor inválido', true); return false; }
        showToast(`🔐 Redirecionando para Multicaixa Express... Simulando carregamento de ${formatMoney(amount, 'AOA')}`, false);
        setTimeout(() => {
            userBalances.AOA = (userBalances.AOA || 0) + amount;
            db.collection('users').doc(currentUser.uid).update({ balances: userBalances });
            showToast(`✅ ${formatMoney(amount, 'AOA')} carregado com sucesso via Multicaixa Express!`, false);
            renderDashboard();
        }, 2000);
        return true;
    }

    // ADMIN Functions
    async function adminAddBalance(userEmail, currency, amount) {
        const usersSnap = await db.collection('users').where('email', '==', userEmail).get();
        if (!usersSnap.empty) {
            const userDoc = usersSnap.docs[0];
            const balances = userDoc.data().balances || { AOA: 0, USD: 0, BRL: 0 };
            balances[currency] = (balances[currency] || 0) + amount;
            await db.collection('users').doc(userDoc.id).update({ balances });
            showToast(`💰 ${formatMoney(amount, currency)} adicionado a ${userEmail}`, false);
            renderDashboard();
        }
    }

    async function renderDashboard() {
        if (!currentUser && !isAdminMode) { renderLogin(); return; }
        
        if (currentUser && !isAdminMode) await loadUserData(currentUser.uid);
        
        const isAdmin = (currentUser?.email === ADMIN_EMAIL) || isAdminMode;
        const balanceNow = userBalances[currentCurrency] || 0;
        
        let html = `
            <div class="app-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div><i class="fas fa-crown" style="color:#d4af37"></i> <span style="color:#e6d5a8; font-weight:bold;">${currentUser?.email || 'MAM Cash'}</span>
                        ${isAdmin ? '<span style="background:#d4af37; color:#0a0a0a; padding:4px 12px; border-radius:20px; margin-left:10px; font-size:0.7rem;">👑 ADMIN</span>' : ''}
                    </div>
                    <button id="logoutBtn" style="background:#222216; border:1px solid #d4af37; padding:8px 18px; border-radius:40px; color:#d4af37; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Sair</button>
                </div>
                
                <!-- CARTÃO VISA -->
                <div class="visa-card">
                    <div class="card-brand"><div class="visa-logo">VISA MAM Cash</div><div>💎</div></div>
                    <div class="card-chip"></div>
                    <div class="card-number-display">${isCardVisible ? userCardData.number : '**** **** **** 9012'}</div>
                    <div class="card-details-row">
                        <div><div class="card-detail-label">VALIDADE</div><div class="card-detail-value">${userCardData.expiry}</div></div>
                        <div><div class="card-detail-label">CVV</div><div class="card-detail-value">${isCardVisible ? userCardData.cvv : '***'}</div></div>
                    </div>
                    <button id="toggleCardBtn" class="toggle-card-btn"><i class="fas ${isCardVisible ? 'fa-eye-slash' : 'fa-eye'}"></i> ${isCardVisible ? 'Ocultar dados' : 'Exibir dados'}</button>
                </div>
                
                <!-- MOEDAS -->
                <div class="currency-tabs">
                    <button class="currency-btn ${currentCurrency === 'AOA' ? 'active' : ''}" data-cur="AOA"><i class="fas fa-coins"></i> Kwanza (AOA)</button>
                    <button class="currency-btn ${currentCurrency === 'USD' ? 'active' : ''}" data-cur="USD"><i class="fas fa-dollar-sign"></i> Dólar (USD)</button>
                    <button class="currency-btn ${currentCurrency === 'BRL' ? 'active' : ''}" data-cur="BRL"><i class="fas fa-real"></i> Real (BRL)</button>
                </div>
                
                <div class="balance-box">
                    <div style="font-size:0.8rem; color:#d4af37;">Saldo disponível</div>
                    <div class="balance-amount">${formatMoney(balanceNow, currentCurrency)}</div>
                </div>
                
                <div class="action-grid">
                    <button id="btnTransfer" class="btn-gold"><i class="fas fa-exchange-alt"></i> Transferir</button>
                    <button id="btnDeposit" class="btn-gold"><i class="fas fa-upload"></i> Depositar</button>
                    <button id="btnWithdraw" class="btn-outline"><i class="fas fa-download"></i> Sacar</button>
                </div>
                
                <!-- MULTICAIXA EXPRESS -->
                <div class="settings-section">
                    <div class="settings-title"><i class="fas fa-mobile-alt"></i> Carregar Cartão via Multicaixa Express</div>
                    <div class="phone-group">
                        <input type="number" id="multicaixaAmount" placeholder="Valor em Kz" style="flex:1;">
                        <button id="multicaixaBtn" class="multicaixa-btn"><i class="fas fa-arrow-right"></i> Carregar Agora</button>
                    </div>
                    <div class="info-text"><i class="fas fa-shield-alt"></i> Seguro e rápido. Você será redirecionado para o ambiente Multicaixa Express.</div>
                </div>
                
                <!-- VINCULAÇÃO DE CONTAS BANCÁRIAS -->
                <div class="settings-section">
                    <div class="settings-title"><i class="fas fa-university"></i> Vincular Contas Bancárias</div>
                    <label>🏦 IBAN (Angola/Internacional)</label>
                    <input type="text" id="ibanInput" placeholder="Ex: AO06 0000 0000 0000 0000 0000 0" value="${userBankData.iban || ''}">
                    <label>🏛️ Nome do Banco</label>
                    <input type="text" id="bankNameInput" placeholder="Ex: BFA, BAI, Banco Sol" value="${userBankData.bankName || ''}">
                    <label><i class="fab fa-paypal"></i> Email do PayPal</label>
                    <input type="email" id="paypalInput" placeholder="seu-email@exemplo.com" value="${userBankData.paypalEmail || ''}">
                    <button id="saveBankBtn" class="btn-gold" style="width:100%; margin-top:15px;"><i class="fas fa-save"></i> Salvar Dados Bancários</button>
                    <div class="info-text"><i class="fas fa-lock"></i> Seus dados são criptografados e seguros.</div>
                </div>`;

        // PAINEL ADMIN
        if (isAdmin) {
            let allUsers = [];
            try {
                const usersSnap = await db.collection('users').get();
                usersSnap.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
            } catch(e) {}
            
            html += `
                <div class="admin-panel">
                    <div class="admin-title"><i class="fas fa-crown"></i> PAINEL ADMIN</div>
                    <h4>📊 Gerenciar Usuários</h4>
                    <select id="adminUserSelect" style="margin-bottom:15px; width:100%; padding:14px; background:#2c271e; border-radius:60px; color:white;">
                        <option value="">Selecione um usuário</option>
                        ${allUsers.map(u => `<option value="${u.email}">${u.email}</option>`).join('')}
                    </select>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <select id="adminCurrencySelect" style="width:100px; padding:14px;"><option>AOA</option><option>USD</option><option>BRL</option></select>
                        <input id="adminAmount" type="number" placeholder="Valor" style="flex:1;">
                        <button id="adminAddBalanceBtn" class="btn-gold" style="padding:12px 20px;"><i class="fas fa-plus"></i> Adicionar</button>
                    </div>
                    <h4 style="margin-top:20px;">👥 Todos os Usuários</h4>
                    ${allUsers.map(user => `<div class="user-card-admin"><strong>${user.email}</strong><br>📞 ${user.phone || 'Não informado'}<br>💰 AOA: ${formatMoney(user.balances?.AOA || 0, 'AOA')}</div>`).join('')}
                </div>`;
        }
        
        document.getElementById('appRoot').innerHTML = html;
        
        // Eventos
        document.querySelectorAll('.currency-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentCurrency = btn.getAttribute('data-cur'); renderDashboard(); });
        });
        document.getElementById('toggleCardBtn')?.addEventListener('click', () => { isCardVisible = !isCardVisible; renderDashboard(); });
        document.getElementById('btnTransfer')?.addEventListener('click', () => openTransferModal());
        document.getElementById('btnDeposit')?.addEventListener('click', () => openDepositModal());
        document.getElementById('btnWithdraw')?.addEventListener('click', () => openWithdrawModal());
        document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; isAdminMode = false; renderLogin(); });
        document.getElementById('multicaixaBtn')?.addEventListener('click', () => {
            const amount = parseFloat(document.getElementById('multicaixaAmount').value);
            loadViaMulticaixa(amount);
        });
        document.getElementById('saveBankBtn')?.addEventListener('click', async () => {
            const iban = document.getElementById('ibanInput').value;
            const bankName = document.getElementById('bankNameInput').value;
            const paypalEmail = document.getElementById('paypalInput').value;
            await saveBankData(iban, bankName, paypalEmail);
        });
        
        if (isAdmin) {
            document.getElementById('adminAddBalanceBtn')?.addEventListener('click', async () => {
                const userEmail = document.getElementById('adminUserSelect').value;
                const currency = document.getElementById('adminCurrencySelect').value;
                const amount = parseFloat(document.getElementById('adminAmount').value);
                if (!userEmail) { showToast('Selecione um usuário', true); return; }
                if (isNaN(amount) || amount <= 0) { showToast('Valor inválido', true); return; }
                await adminAddBalance(userEmail, currency, amount);
            });
        }
    }

    async function openTransferModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-paper-plane"></i> Transferir</h3>
            <input id="transferEmail" placeholder="Email do destinatário"><input id="transferAmount" type="number" placeholder="Valor">
            <select id="transferCurrency"><option>AOA</option><option>USD</option><option>BRL</option></select>
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="confirmTransfer" class="btn-gold">Enviar</button><button id="closeModal" class="btn-outline">Cancelar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        document.getElementById('confirmTransfer').onclick = async () => {
            const toEmail = document.getElementById('transferEmail').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const currency = document.getElementById('transferCurrency').value;
            if (!toEmail || isNaN(amount) || amount <= 0) { showToast('Dados inválidos', true); return; }
            if (userBalances[currency] < amount) { showToast('Saldo insuficiente', true); return; }
            const usersSnap = await db.collection('users').where('email', '==', toEmail).get();
            if (usersSnap.empty) { showToast('Destinatário não encontrado', true); return; }
            const targetUser = usersSnap.docs[0];
            const targetBalances = targetUser.data().balances || { AOA: 0, USD: 0, BRL: 0 };
            targetBalances[currency] = (targetBalances[currency] || 0) + amount;
            userBalances[currency] -= amount;
            await db.collection('users').doc(targetUser.id).update({ balances: targetBalances });
            await db.collection('users').doc(currentUser.uid).update({ balances: userBalances });
            showToast(`Transferência de ${formatMoney(amount, currency)} enviada`, false);
            modal.remove(); renderDashboard();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    async function openDepositModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-upload"></i> Solicitar Depósito</h3>
            <input id="depositAmount" type="number" placeholder="Valor"><select id="depositCurrency"><option>AOA</option><option>USD</option><option>BRL</option></select>
            <textarea id="depositProof" placeholder="Comprovativo (print/foto)" rows="3"></textarea>
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="sendDeposit" class="btn-gold">Solicitar</button><button id="closeDeposit" class="btn-outline">Fechar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        document.getElementById('sendDeposit').onclick = async () => {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const currency = document.getElementById('depositCurrency').value;
            const proof = document.getElementById('depositProof').value;
            if (isNaN(amount) || amount <= 0) { showToast('Valor inválido', true); return; }
            await db.collection('deposits').add({
                userId: currentUser.uid, userEmail: currentUser.email,
                amount, currency, proof, status: 'pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`📤 Pedido de depósito enviado. Aguarde aprovação.`, false);
            modal.remove();
        };
        document.getElementById('closeDeposit').onclick = () => modal.remove();
    }

    async function openWithdrawModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-download"></i> Solicitar Saque</h3>
            <input id="withdrawAmount" type="number" placeholder="Valor"><select id="withdrawCurrency"><option>AOA</option><option>USD</option><option>BRL</option></select>
            <select id="withdrawMethod"><option value="iban">🏦 Transferência Bancária (IBAN)</option><option value="paypal">💳 PayPal</option></select>
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="confirmWithdraw" class="btn-gold">Solicitar Saque</button><button id="closeWithdraw" class="btn-outline">Fechar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        document.getElementById('confirmWithdraw').onclick = async () => {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const currency = document.getElementById('withdrawCurrency').value;
            const method = document.getElementById('withdrawMethod').value;
            if (isNaN(amount) || amount <= 0) { showToast('Valor inválido', true); return; }
            if (userBalances[currency] < amount) { showToast('Saldo insuficiente', true); return; }
            await db.collection('withdrawals').add({
                userId: currentUser.uid, userEmail: currentUser.email,
                amount, currency, method, status: 'pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`📤 Pedido de saque enviado. Aguarde aprovação.`, false);
            modal.remove();
        };
        document.getElementById('closeWithdraw').onclick = () => modal.remove();
    }

    // TELA DE LOGIN
    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:460px; margin: 5vh auto; background:#12100b; border-radius:56px; padding:38px 28px; border:1px solid #d4af37;">
                <div style="text-align:center;"><i class="fas fa-shield-alt" style="font-size:3rem; color:#d4af37;"></i><h2 style="color:#d4af37;">MAM Cash</h2><p style="color:#b99f5a;">Sistema com verificação 2FA</p></div>
                <div id="loginStep1">
                    <input id="loginEmail" placeholder="Email" style="width:100%; margin:16px 0 12px; padding:14px; background:#2c271e; border-radius:60px; color:white;">
                    <div class="password-wrapper"><input id="loginPassword" type="password" placeholder="Senha" style="background:#2c271e;"><button type="button" id="toggleLoginPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                    <button id="doLoginStep1" class="btn-gold" style="width:100%; margin-top:16px;">Continuar</button>
                    <button id="goToRegister" class="btn-outline" style="width:100%; margin-top:12px;">Criar Conta</button>
                </div>
                <div id="loginStep2" style="display:none;">
                    <p style="color:#d4af37; text-align:center;">Escolha como receber o código de 4 dígitos</p>
                    <button id="sendCodeEmail" class="btn-gold" style="width:100%; margin:10px 0;"><i class="fas fa-envelope"></i> Receber por E-mail</button>
                    <button id="sendCodeSMS" class="btn-outline" style="width:100%; margin:10px 0;"><i class="fas fa-phone"></i> Receber por SMS</button>
                    <button id="backToLoginStep1" class="btn-outline" style="width:100%; margin-top:10px;">Voltar</button>
                </div>
                <div id="loginStep3" style="display:none;">
                    <p style="color:#d4af37; text-align:center;">Digite o código de 4 dígitos</p>
                    <input id="verificationCode" type="text" maxlength="4" placeholder="____" style="text-align:center; font-size:1.8rem; letter-spacing:10px; background:#2c271e; color:white;">
                    <button id="verifyCodeBtn" class="btn-gold" style="width:100%; margin-top:16px;">Verificar</button>
                    <button id="resendCodeBtn" class="btn-outline" style="width:100%; margin-top:10px;">Reenviar código</button>
                </div>
            </div>`;
        
        document.getElementById('toggleLoginPass')?.addEventListener('click', () => {
            const inp = document.getElementById('loginPassword');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        });
        
        document.getElementById('doLoginStep1').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showToast('Preencha email e senha', true); return; }
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                pendingUserEmail = email;
                pendingUserPassword = password;
                document.getElementById('loginStep1').style.display = 'none';
                document.getElementById('loginStep2').style.display = 'block';
                return;
            }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                const userDoc = await db.collection('users').doc(auth.currentUser.uid).get();
                const userPhone = userDoc.exists ? userDoc.data().phone : '';
                pendingUserEmail = email;
                pendingUserPassword = password;
                window.tempUserPhone = userPhone;
                document.getElementById('loginStep1').style.display = 'none';
                document.getElementById('loginStep2').style.display = 'block';
            } catch(e) { showToast(e.message, true); }
        };
        
        document.getElementById('sendCodeEmail').onclick = async () => {
            await send2FACode(pendingUserEmail, '', 'email');
            document.getElementById('loginStep2').style.display = 'none';
            document.getElementById('loginStep3').style.display = 'block';
        };
        
        document.getElementById('sendCodeSMS').onclick = async () => {
            let phone = window.tempUserPhone;
            if (!phone && pendingUserEmail === ADMIN_EMAIL) phone = ADMIN_PHONE;
            if (!phone) { showToast('Número não cadastrado', true); return; }
            await send2FACode('', phone, 'sms');
            document.getElementById('loginStep2').style.display = 'none';
            document.getElementById('loginStep3').style.display = 'block';
        };
        
        document.getElementById('verifyCodeBtn').onclick = async () => {
            const code = document.getElementById('verificationCode').value;
            if (code === pending2FACode) {
                showToast('✅ Código verificado!', false);
                if (pendingUserEmail === ADMIN_EMAIL && pendingUserPassword === ADMIN_PASSWORD) {
                    isAdminMode = true;
                    currentUser = { email: ADMIN_EMAIL, uid: 'admin_' + Date.now() };
                    userBalances = { AOA: 100000, USD: 5000, BRL: 10000 };
                    await renderDashboard();
                } else {
                    await auth.signInWithEmailAndPassword(pendingUserEmail, pendingUserPassword);
                }
            } else { showToast('❌ Código inválido!', true); }
        };
        
        document.getElementById('resendCodeBtn').onclick = async () => {
            if (pending2FAType === 'email') await send2FACode(pendingUserEmail, '', 'email');
            else { let phone = window.tempUserPhone; if (!phone && pendingUserEmail === ADMIN_EMAIL) phone = ADMIN_PHONE; await send2FACode('', phone, 'sms'); }
            showToast('Código reenviado!', false);
        };
        
        document.getElementById('backToLoginStep1').onclick = () => {
            document.getElementById('loginStep2').style.display = 'none';
            document.getElementById('loginStep1').style.display = 'block';
        };
        
        document.getElementById('goToRegister').onclick = () => renderRegister();
    }

    function renderRegister() {
        let codeOptions = countryCodes.map(c => `<option value="${c.code}" ${c.code === '+244' ? 'selected' : ''}>${c.code} (${c.country})</option>`).join('');
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:480px; margin: 3vh auto; background:#12100b; border-radius:56px; padding:32px 28px; border:1px solid #d4af37;">
                <h2 style="color:#d4af37; text-align:center;">Criar Conta</h2>
                <input id="regFirstName" placeholder="Nome" style="background:#2c271e; color:white;">
                <input id="regLastName" placeholder="Sobrenome" style="background:#2c271e; color:white;">
                <input id="regEmail" placeholder="Email" style="background:#2c271e; color:white;">
                <div class="phone-group">
                    <select id="regCountryCode" class="country-code-select">${codeOptions}</select>
                    <input id="regPhone" class="phone-input" placeholder="Número de telefone">
                </div>
                <div class="password-wrapper"><input id="regPassword" type="password" placeholder="Senha (min 6)" style="background:#2c271e;"><button type="button" id="toggleRegPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <div class="password-wrapper"><input id="regConfirmPassword" type="password" placeholder="Confirmar Senha" style="background:#2c271e;"><button type="button" id="toggleRegConfirm" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <button id="doRegister" class="btn-gold" style="width:100%; margin-top:16px;">Registrar</button>
                <button id="backToLogin" class="btn-outline" style="width:100%; margin-top:12px;">Voltar ao Login</button>
            </div>`;
        
        document.getElementById('toggleRegPass')?.addEventListener('click', () => { const inp = document.getElementById('regPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('toggleRegConfirm')?.addEventListener('click', () => { const inp = document.getElementById('regConfirmPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        
        document.getElementById('doRegister').onclick = async () => {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const countryCode = document.getElementById('regCountryCode').value;
            const phoneNumber = document.getElementById('regPhone').value;
            const fullPhone = `${countryCode} ${phoneNumber}`;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if (!firstName || !lastName || !email || !phoneNumber || !password) { showToast('Preencha todos os campos', true); return; }
            if (password !== confirm) { showToast('Senhas não coincidem', true); return; }
            if (password.length < 6) { showToast('Senha mínima 6 caracteres', true); return; }
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCred.user.uid).set({
                    firstName, lastName, email, phone: fullPhone,
                    balances: { AOA: 0, USD: 0, BRL: 0 },
                    iban: "", bankName: "", paypalEmail: "",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('✅ Conta criada! Faça login.', false);
                renderLogin();
            } catch(e) { showToast(e.message, true); }
        };
        document.getElementById('backToLogin').onclick = () => renderLogin();
    }

    auth.onAuthStateChanged(async user => {
        if (user && !isAdminMode) { currentUser = user; await renderDashboard(); }
        else if (!user && !isAdminMode) { renderLogin(); }
    });
    
    renderLogin();
</script>
