<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAM Cash • Plataforma Financeira Multi-Moeda</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        /* Fundo temático com moedas e dinheiro */
        body {
            background: linear-gradient(135deg, #0a0f0a 0%, #0c0b05 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Overlay de moedas flutuantes animadas */
        body::before {
            content: "💰 💵 💶 💷 💎 🪙";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 70px;
            opacity: 0.03;
            pointer-events: none;
            white-space: pre;
            overflow: hidden;
            letter-spacing: 30px;
            line-height: 1.8;
            animation: floatMoney 40s infinite linear;
            z-index: 0;
        }
        
        @keyframes floatMoney {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(-200px) translateX(50px); }
        }
        
        /* Partículas de moedas adicionais */
        .coin-particle {
            position: fixed;
            font-size: 24px;
            opacity: 0.08;
            pointer-events: none;
            animation: floatCoin 25s infinite ease-in-out;
            z-index: 0;
        }
        
        @keyframes floatCoin {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        
        .app-container {
            max-width: 650px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        
        /* Cartão Premium Black & Gold */
        .card-premium {
            background: linear-gradient(135deg, #1a160c 0%, #0c0a04 100%);
            border-radius: 32px;
            padding: 26px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 30px 45px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(212,175,55,0.3);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card-premium::after {
            content: "💳";
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
        .card-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .status-badge {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .status-active { color: #2ecc71; border-left: 3px solid #2ecc71; background: #0a1f0a; }
        .status-inactive { color: #e67e22; border-left: 3px solid #e67e22; background: #1f140a; }
        .card-number {
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-weight: 500;
            color: #f5e2b0;
            margin-bottom: 28px;
            font-family: monospace;
        }
        .card-footer-row {
            display: flex;
            justify-content: space-between;
            color: #d4af37;
            font-size: 0.75rem;
        }
        
        /* Tabs de moeda */
        .currency-tabs {
            display: flex;
            gap: 12px;
            background: #12100c;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid #3a321c;
        }
        .currency-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            border-radius: 50px;
            font-weight: bold;
            color: #b9a46b;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .currency-btn.active {
            background: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }
        .balance-box {
            background: linear-gradient(145deg, #0e0c07, #080703);
            border-radius: 28px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #d4af3740;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }
        .balance-amount {
            font-size: 2.9rem;
            font-weight: 800;
            color: #f5c542;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .btn-gold {
            background: linear-gradient(95deg, #d4af37, #b8941e);
            border: none;
            padding: 15px;
            border-radius: 48px;
            font-weight: bold;
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .btn-gold:hover { transform: scale(0.97); background: linear-gradient(95deg, #c6a12e, #a57e18); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d4af37;
            padding: 15px;
            border-radius: 48px;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover { background: #d4af3715; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1710;
            max-width: 94%;
            width: 480px;
            border-radius: 48px;
            padding: 32px;
            border-top: 4px solid #d4af37;
            box-shadow: 0 30px 50px black;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: #2c271e;
            border: 1px solid #d4af3760;
            border-radius: 60px;
            color: #fff;
            font-size: 0.95rem;
        }
        .admin-panel {
            background: #0e0c08;
            border-radius: 32px;
            padding: 22px;
            margin-top: 24px;
            border: 1px solid #d4af3740;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1b12;
            color: #ffdf9c;
            padding: 12px 28px;
            border-radius: 60px;
            border-left: 5px solid #d4af37;
            z-index: 3000;
            display: none;
            font-weight: bold;
            box-shadow: 0 8px 20px black;
        }
        .forgot-link {
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            color: #d4af37;
            font-size: 0.85rem;
            text-decoration: underline;
        }
        @media (max-width: 500px) {
            .balance-amount { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div id="coinParticles"></div>
<div id="appRoot"></div>
<div id="toastMessage" class="toast"></div>

<script>
    // Config Firebase
    const firebaseConfig = {
        apiKey: 'AIzaSyC90uEwso8ZP3s7tLvV_z88ZbUijXLOpPU',
        authDomain: 'project-73108ea9-d1b2-4ac3-8fb.firebaseapp.com',
        projectId: 'project-73108ea9-d1b2-4ac3-8fb',
        storageBucket: 'project-73108ea9-d1b2-4ac3-8fb.firebasestorage.app',
        messagingSenderId: '869497428830',
        appId: '1:869497428830:web:27ef20567761e7b0d3cdcf'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADMIN_EMAIL = "mamfilhos29@gmail.com";
    // Taxas de câmbio (editáveis pelo admin)
    let exchangeRates = { AOA_USD: 0.00115, USD_AOA: 870, AOA_BRL: 0.0062, BRL_AOA: 161, USD_BRL: 5.35, BRL_USD: 0.187 };
    
    let currentUser = null;
    let currentCurrency = 'AOA';
    let userBalances = { AOA: 0, USD: 0, BRL: 0 };
    let cardActivated = false;
    
    // Criar partículas de moedas no fundo
    function createCoinParticles() {
        const container = document.getElementById('coinParticles');
        const coins = ['💰', '💵', '💶', '🪙', '💷', '💎'];
        for (let i = 0; i < 35; i++) {
            const particle = document.createElement('div');
            particle.className = 'coin-particle';
            particle.innerHTML = coins[Math.floor(Math.random() * coins.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 30 + 's';
            particle.style.animationDuration = 15 + Math.random() * 25 + 's';
            particle.style.fontSize = (20 + Math.random() * 40) + 'px';
            container.appendChild(particle);
        }
    }
    createCoinParticles();
    
    function showToast(msg) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }
    
    function formatMoney(value, currency) {
        if (isNaN(value)) value = 0;
        const opts = { style: 'currency', currency: currency, minimumFractionDigits: 2 };
        if (currency === 'AOA') opts.currency = 'AOA';
        return new Intl.NumberFormat('pt-AO', opts).format(value);
    }
    
    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            userBalances = { AOA: data.balances?.AOA || 0, USD: data.balances?.USD || 0, BRL: data.balances?.BRL || 0 };
            cardActivated = data.cardActivated || false;
            window.linkedIBAN = data.linkedIBAN || '';
            window.linkedPaypal = data.linkedPaypal || '';
        } else {
            userBalances = { AOA: 0, USD: 0, BRL: 0 };
            cardActivated = false;
            await db.collection('users').doc(uid).set({
                email: currentUser.email,
                balances: { AOA: 0, USD: 0, BRL: 0 },
                cardActivated: false,
                linkedIBAN: '',
                linkedPaypal: '',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.linkedIBAN = '';
            window.linkedPaypal = '';
        }
    }
    
    async function updateFirestoreBalances(uid) {
        await db.collection('users').doc(uid).update({ balances: userBalances });
    }
    
    async function requestCardActivation(uid) {
        if (cardActivated) { showToast('Cartão já está ativo'); return false; }
        if (userBalances.AOA < 5000) {
            showToast(`Saldo insuficiente em AOA. Taxa: ${formatMoney(5000, 'AOA')}`);
            return false;
        }
        await db.collection('cardRequests').add({
            userId: uid,
            userEmail: currentUser.email,
            status: 'pending',
            fee: 5000,
            bonus: 500,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('✅ Pedido de ativação enviado ao administrador.');
        return true;
    }
    
    async function adminApproveCard(userId, fee, bonus) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        if (!userDoc.exists) return;
        const balances = userDoc.data().balances || { AOA: 0, USD: 0, BRL: 0 };
        if (balances.AOA < fee) { showToast('Saldo insuficiente para taxa'); return; }
        const newBalances = { ...balances };
        newBalances.AOA = balances.AOA - fee + bonus;
        await userRef.update({ balances: newBalances, cardActivated: true });
        const reqQuery = await db.collection('cardRequests').where('userId', '==', userId).where('status', '==', 'pending').get();
        reqQuery.forEach(doc => doc.ref.update({ status: 'approved' }));
        showToast(`🔓 Cartão ativado! Bónus: ${formatMoney(bonus, 'AOA')}`);
        if (currentUser && currentUser.uid === userId) {
            userBalances = newBalances;
            cardActivated = true;
            renderDashboard();
        }
    }
    
    async function exchangeCurrency(from, to, amount) {
        if (amount <= 0) return false;
        let rate = 1;
        if (from === 'AOA' && to === 'USD') rate = exchangeRates.AOA_USD;
        else if (from === 'USD' && to === 'AOA') rate = exchangeRates.USD_AOA;
        else if (from === 'AOA' && to === 'BRL') rate = exchangeRates.AOA_BRL;
        else if (from === 'BRL' && to === 'AOA') rate = exchangeRates.BRL_AOA;
        else if (from === 'USD' && to === 'BRL') rate = exchangeRates.USD_BRL;
        else if (from === 'BRL' && to === 'USD') rate = exchangeRates.BRL_USD;
        else { showToast('Par não suportado'); return false; }
        if (userBalances[from] < amount) { showToast(`Saldo insuficiente em ${from}`); return false; }
        const converted = amount * rate;
        userBalances[from] -= amount;
        userBalances[to] += converted;
        await updateFirestoreBalances(currentUser.uid);
        showToast(`🔄 Conversão: ${formatMoney(amount, from)} → ${formatMoney(converted, to)}`);
        renderDashboard();
        return true;
    }
    
    async function requestDeposit(amount, method, proofText, currency) {
        if (amount <= 0) return;
        await db.collection('deposits').add({
            userId: currentUser.uid,
            userEmail: currentUser.email,
            amount: amount,
            currency: currency,
            method: method,
            proof: proofText,
            status: 'pending',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast(`📤 Pedido de depósito de ${formatMoney(amount, currency)} enviado.`);
    }
    
    async function adminApproveDeposit(depositId, userId, amount, currency) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        const balances = userDoc.data().balances || { AOA:0, USD:0, BRL:0 };
        balances[currency] = (balances[currency] || 0) + amount;
        await userRef.update({ balances: balances });
        await db.collection('deposits').doc(depositId).update({ status: 'approved' });
        showToast(`✅ Depósito de ${formatMoney(amount, currency)} aprovado!`);
        if (currentUser && currentUser.uid === userId) {
            userBalances = balances;
            renderDashboard();
        }
    }
    
    async function adminUpdateBalance(userId, currency, newAmount) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        const balances = userDoc.data().balances;
        balances[currency] = newAmount;
        await userRef.update({ balances });
        showToast(`✏️ Saldo ${currency} atualizado manualmente.`);
        if (currentUser && currentUser.uid === userId) {
            userBalances = balances;
            renderDashboard();
        }
    }
    
    async function saveLinkedAccounts(iban, paypal) {
        await db.collection('users').doc(currentUser.uid).update({ linkedIBAN: iban, linkedPaypal: paypal });
        window.linkedIBAN = iban;
        window.linkedPaypal = paypal;
        showToast('🔗 Contas vinculadas com sucesso!');
        renderDashboard();
    }
    
    // Esqueci a senha - recuperação
    function sendPasswordReset(email) {
        auth.sendPasswordResetEmail(email).then(() => {
            showToast('📧 Email de recuperação enviado! Verifique sua caixa de entrada.');
        }).catch(err => {
            showToast('Erro: ' + err.message);
        });
    }
    
    async function renderDashboard() {
        if (!currentUser) { renderLogin(); return; }
        await loadUserData(currentUser.uid);
        const isAdmin = (currentUser.email === ADMIN_EMAIL);
        const balanceNow = userBalances[currentCurrency] || 0;
        const cardStatusText = cardActivated ? 'ATIVO • PREMIUM' : 'BLOQUEADO';
        const cardStatusClass = cardActivated ? 'status-active' : 'status-inactive';
        
        let html = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div><i class="fas fa-gem" style="color:#d4af37"></i> <span style="color:#e6d5a8;">${currentUser.email}</span></div>
                <button id="logoutMainBtn" style="background:#222216; border:1px solid #d4af37; padding:8px 18px; border-radius:40px; color:#d4af37; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
            <div class="card-premium">
                <div class="card-status">
                    <span class="status-badge ${cardStatusClass}"><i class="fas ${cardActivated ? 'fa-check-circle' : 'fa-lock'}"></i> ${cardStatusText}</span>
                    <span><i class="fas fa-microchip"></i> MAM BLACK</span>
                </div>
                <div class="card-number">****  ****  ****  ${currentUser.uid.slice(-4)}</div>
                <div class="card-footer-row">
                    <span>Válido 12/29</span>
                    <span><i class="fas fa-globe"></i> Multi-Moeda</span>
                </div>
            </div>
            <div class="currency-tabs">
                <button class="currency-btn ${currentCurrency === 'AOA' ? 'active' : ''}" data-cur="AOA"><i class="fas fa-coins"></i> Kwanza (AOA)</button>
                <button class="currency-btn ${currentCurrency === 'USD' ? 'active' : ''}" data-cur="USD"><i class="fas fa-dollar-sign"></i> USD</button>
                <button class="currency-btn ${currentCurrency === 'BRL' ? 'active' : ''}" data-cur="BRL"><i class="fas fa-real"></i> BRL</button>
            </div>
            <div class="balance-box">
                <div style="font-size:0.8rem; color:#d4af37;">Saldo disponível</div>
                <div class="balance-amount">${formatMoney(balanceNow, currentCurrency)}</div>
            </div>
            <div class="action-grid">
                <button id="btnTransfer" class="btn-gold"><i class="fas fa-exchange-alt"></i> Transferir</button>
                <button id="btnDeposit" class="btn-gold"><i class="fas fa-upload"></i> Depositar</button>
                <button id="btnExchange" class="btn-outline"><i class="fas fa-chart-line"></i> Câmbio</button>
                <button id="btnActivateCard" class="btn-outline"><i class="fas fa-credit-card"></i> Ativar Cartão</button>
            </div>
            <div style="background:#12100b; border-radius:28px; padding:18px; margin-bottom:20px; border:1px solid #2a2416;">
                <h4 style="color:#d4af37; margin-bottom:12px;"><i class="fas fa-link"></i> Contas Vinculadas</h4>
                <div><small>🏦 IBAN Angola:</small> <strong>${window.linkedIBAN || '—'}</strong> <button id="editIbanBtn" class="btn-outline" style="padding:4px 14px; font-size:12px;">Editar</button></div>
                <div style="margin-top:10px;"><small>📧 PayPal Email:</small> <strong>${window.linkedPaypal || '—'}</strong> <button id="editPaypalBtn" class="btn-outline" style="padding:4px 14px; font-size:12px;">Editar</button></div>
            </div>
        `;
        
        if (isAdmin) {
            const pendingDepositsSnap = await db.collection('deposits').where('status', '==', 'pending').get();
            const pendingCardsSnap = await db.collection('cardRequests').where('status', '==', 'pending').get();
            const allUsersSnap = await db.collection('users').get();
            let pendingDeposits = [], pendingCards = [], allUsers = [];
            pendingDepositsSnap.forEach(d => pendingDeposits.push({id: d.id, ...d.data()}));
            pendingCardsSnap.forEach(d => pendingCards.push({id: d.id, ...d.data()}));
            allUsersSnap.forEach(d => allUsers.push({id: d.id, email: d.data().email, balances: d.data().balances}));
            
            html += `<div class="admin-panel"><h3 style="color:#d4af37;"><i class="fas fa-crown"></i> Painel Administrador</h3>`;
            html += `<h4 style="margin:16px 0 8px;">📥 Depósitos Pendentes</h4>`;
            if(pendingDeposits.length===0) html += `<p>✨ Nenhum depósito aguardando</p>`;
            pendingDeposits.forEach(dp => {
                html += `<div style="border-left:3px solid #d4af37; background:#1a1710; margin:12px 0; padding:14px; border-radius:24px;">
                            <div><strong>${dp.userEmail}</strong> | ${formatMoney(dp.amount, dp.currency)} (${dp.method})</div>
                            <div><small>📎 ${dp.proof}</small></div>
                            <button class="approveDepositBtn" data-id="${dp.id}" data-uid="${dp.userId}" data-amount="${dp.amount}" data-currency="${dp.currency}" style="background:#27ae60; border:none; padding:6px 18px; border-radius:40px; margin-right:8px;">✔ Aprovar</button>
                            <button class="rejectDepositBtn" data-id="${dp.id}" style="background:#c0392b; border:none; padding:6px 18px; border-radius:40px;">✖ Rejeitar</button>
                         </div>`;
            });
            html += `<h4 style="margin:16px 0 8px;">💳 Ativação de Cartão (5.000 Kz)</h4>`;
            if(pendingCards.length===0) html+=`<p>Sem pedidos pendentes</p>`;
            pendingCards.forEach(card => {
                html += `<div style="border-left:3px solid #e67e22; background:#1a1710; margin:12px 0; padding:12px;">
                            <div>👤 ${card.userEmail}</div>
                            <button class="approveCardBtn" data-id="${card.id}" data-uid="${card.userId}" data-fee="${card.fee}" data-bonus="${card.bonus}" style="background:#d4af37; border:none; padding:6px 18px; border-radius:40px;">🔓 Ativar Cartão</button>
                         </div>`;
            });
            html += `<h4 style="margin:16px 0 8px;">✏️ Editar Saldos</h4><select id="adminUserSelect" style="background:#2c271e; padding:10px;">`;
            allUsers.forEach(u => html += `<option value="${u.id}">${u.email}</option>`);
            html += `</select><div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
                        <input id="adminEditAmount" placeholder="Valor" style="flex:1;">
                        <select id="adminCurrencySelect"><option>AOA</option><option>USD</option><option>BRL</option></select>
                        <button id="adminUpdateBalanceBtn" class="btn-gold" style="padding:10px 20px;">Atualizar</button>
                     </div>`;
            html += `<hr><h4>💱 Taxas de Câmbio (Lucro)</h4>
                     <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        <input id="rateAOAUSD" placeholder="AOA→USD" value="${exchangeRates.AOA_USD}"><input id="rateUSDAOA" placeholder="USD→AOA" value="${exchangeRates.USD_AOA}">
                        <input id="rateAOABRL" placeholder="AOA→BRL" value="${exchangeRates.AOA_BRL}"><input id="rateBRLAOA" placeholder="BRL→AOA" value="${exchangeRates.BRL_AOA}">
                     </div>
                     <button id="saveRatesBtn" class="btn-gold" style="margin-top:12px;">Salvar Taxas</button>`;
            html += `</div>`;
        }
        document.getElementById('appRoot').innerHTML = html;
        
        document.querySelectorAll('.currency-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentCurrency = btn.getAttribute('data-cur'); renderDashboard(); });
        });
        document.getElementById('btnTransfer')?.addEventListener('click', () => openTransferModal());
        document.getElementById('btnDeposit')?.addEventListener('click', () => openDepositModal());
        document.getElementById('btnExchange')?.addEventListener('click', () => openExchangeModal());
        document.getElementById('btnActivateCard')?.addEventListener('click', () => requestCardActivation(currentUser.uid));
        document.getElementById('logoutMainBtn')?.addEventListener('click', () => auth.signOut());
        document.getElementById('editIbanBtn')?.addEventListener('click', () => openLinkedModal('iban'));
        document.getElementById('editPaypalBtn')?.addEventListener('click', () => openLinkedModal('paypal'));
        
        if (isAdmin) {
            document.querySelectorAll('.approveDepositBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await adminApproveDeposit(btn.getAttribute('data-id'), btn.getAttribute('data-uid'), parseFloat(btn.getAttribute('data-amount')), btn.getAttribute('data-currency'));
                    renderDashboard();
                });
            });
            document.querySelectorAll('.rejectDepositBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await db.collection('deposits').doc(btn.getAttribute('data-id')).update({ status: 'rejected' });
                    showToast('Depósito rejeitado'); renderDashboard();
                });
            });
            document.querySelectorAll('.approveCardBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await adminApproveCard(btn.getAttribute('data-uid'), parseFloat(btn.getAttribute('data-fee')), parseFloat(btn.getAttribute('data-bonus')));
                    renderDashboard();
                });
            });
            document.getElementById('adminUpdateBalanceBtn')?.addEventListener('click', async () => {
                const userId = document.getElementById('adminUserSelect').value;
                const currency = document.getElementById('adminCurrencySelect').value;
                const newAmount = parseFloat(document.getElementById('adminEditAmount').value);
                if(!isNaN(newAmount)) await adminUpdateBalance(userId, currency, newAmount);
                renderDashboard();
            });
            document.getElementById('saveRatesBtn')?.addEventListener('click', () => {
                exchangeRates = { AOA_USD: parseFloat(document.getElementById('rateAOAUSD').value) || 0.00115, USD_AOA: parseFloat(document.getElementById('rateUSDAOA').value) || 870, AOA_BRL: parseFloat(document.getElementById('rateAOABRL').value) || 0.0062, BRL_AOA: parseFloat(document.getElementById('rateBRLAOA').value) || 161, USD_BRL: 5.35, BRL_USD: 0.187 };
                showToast('💱 Taxas atualizadas');
            });
        }
    }
    
    async function openTransferModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-paper-plane"></i> Transferir</h3>
            <input id="transferEmail" placeholder="Email do destinatário"><input id="transferAmount" type="number" placeholder="Valor"><select id="transferCurrency"><option>AOA</option><option>USD</option><option>BRL</option></select>
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="confirmTransfer" class="btn-gold">Enviar</button><button id="closeModal" class="btn-outline">Cancelar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        document.getElementById('confirmTransfer').onclick = async () => {
            const toEmail = document.getElementById('transferEmail').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const currency = document.getElementById('transferCurrency').value;
            if (!toEmail || isNaN(amount) || amount<=0) { showToast('Dados inválidos'); return; }
            if (userBalances[currency] < amount) { showToast('Saldo insuficiente'); return; }
            const usersSnap = await db.collection('users').where('email', '==', toEmail).get();
            if (usersSnap.empty) { showToast('Destinatário não encontrado'); return; }
            const targetUser = usersSnap.docs[0];
            const targetBalances = targetUser.data().balances;
            targetBalances[currency] = (targetBalances[currency] || 0) + amount;
            userBalances[currency] -= amount;
            await db.collection('users').doc(targetUser.id).update({ balances: targetBalances });
            await updateFirestoreBalances(currentUser.uid);
            showToast(`Transferência de ${formatMoney(amount, currency)} enviada.`);
            modal.remove(); renderDashboard();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }
    
    async function openDepositModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-university"></i> Depósito</h3>
            <select id="depositMethod"><option value="Angola">🏦 Angola (Multicaixa/IBAN)</option><option value="Crypto">💎 USDT (TRC20)</option><option value="PayPal">💳 PayPal / Cartão Visa</option></select>
            <input id="depositAmount" placeholder="Valor"><select id="depositCurrency"><option>AOA</option><option>USD</option><option>BRL</option></select>
            <textarea id="depositProof" placeholder="Comprovativo / hash / print"></textarea>
            <div style="display:flex; gap:12px;"><button id="sendDeposit" class="btn-gold">Solicitar</button><button id="closeDeposit" class="btn-outline">Fechar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display='flex';
        document.getElementById('sendDeposit').onclick = async () => {
            const method = document.getElementById('depositMethod').value;
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const currency = document.getElementById('depositCurrency').value;
            const proof = document.getElementById('depositProof').value;
            if(isNaN(amount) || amount<=0) return;
            await requestDeposit(amount, method, proof, currency);
            modal.remove();
        };
        document.getElementById('closeDeposit').onclick = () => modal.remove();
    }
    
    async function openExchangeModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>💰 Câmbio MAM Cash</h3>
            <select id="fromCurr"><option>AOA</option><option>USD</option><option>BRL</option></select> → <select id="toCurr"><option>USD</option><option>AOA</option><option>BRL</option></select>
            <input id="exchangeAmount" placeholder="Montante">
            <button id="doExchange" class="btn-gold">Converter</button><button id="closeEx" class="btn-outline">Fechar</button></div>`;
        document.body.appendChild(modal); modal.style.display='flex';
        document.getElementById('doExchange').onclick = async () => {
            await exchangeCurrency(document.getElementById('fromCurr').value, document.getElementById('toCurr').value, parseFloat(document.getElementById('exchangeAmount').value));
            modal.remove();
        };
        document.getElementById('closeEx').onclick = () => modal.remove();
    }
    
    async function openLinkedModal(type) {
        const modal = document.createElement('div'); modal.className = 'modal';
        if(type === 'iban') modal.innerHTML = `<div class="modal-content"><h3>🏦 IBAN Angola</h3><input id="ibanValue" placeholder="Número IBAN"><button id="saveIban" class="btn-gold">Salvar</button><button id="closeModal" class="btn-outline">Cancelar</button></div>`;
        else modal.innerHTML = `<div class="modal-content"><h3>📧 PayPal Email</h3><input id="paypalValue" placeholder="Email PayPal"><button id="savePaypal" class="btn-gold">Salvar</button><button id="closeModal" class="btn-outline">Cancelar</button></div>`;
        document.body.appendChild(modal); modal.style.display='flex';
        const saveBtn = type === 'iban' ? document.getElementById('saveIban') : document.getElementById('savePaypal');
        saveBtn.onclick = async () => {
            const value = type==='iban' ? document.getElementById('ibanValue').value : document.getElementById('paypalValue').value;
            let newIban = window.linkedIBAN, newPaypal = window.linkedPaypal;
            if(type === 'iban') newIban = value; else newPaypal = value;
            await saveLinkedAccounts(newIban, newPaypal);
            modal.remove();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }
    
    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:460px; margin: 10vh auto; background:#12100b; border-radius:56px; padding:38px 28px; border:1px solid #d4af37; box-shadow: 0 20px 40px black;">
                <div style="text-align:center;"><i class="fas fa-coins" style="font-size:3rem; color:#d4af37;"></i><h2 style="color:#d4af37; margin-top:8px;">MAM CASH</h2><p style="color:#b99f5a;">Plataforma Multi-Moeda Premium</p></div>
                <input id="loginEmail" placeholder="Email" style="width:100%; margin:16px 0 12px; padding:14px; background:#2a241b; border:1px solid #d4af3760; border-radius:60px; color:white;">
                <input id="loginPassword" type="password" placeholder="Senha" style="width:100%; margin:8px 0; padding:14px; background:#2a241b; border:1px solid #d4af3760; border-radius:60px;">
                <button id="doLogin" class="btn-gold" style="width:100%; margin-top:16px;">Entrar</button>
                <button id="doRegister" class="btn-outline" style="width:100%; margin-top:12px;">Criar Conta</button>
                <div class="forgot-link" id="forgotPasswordBtn"><i class="fas fa-key"></i> Esqueci a senha</div>
                <p style="font-size:12px; text-align:center; margin-top:20px;">🔐 Admin: mamfilhos29@gmail.com | Angell28</p>
            </div>`;
        document.getElementById('doLogin').onclick = async () => {
            try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); } 
            catch(e) { showToast(e.message); }
        };
        document.getElementById('doRegister').onclick = async () => {
            const email = document.getElementById('loginEmail').value, pass = document.getElementById('loginPassword').value;
            if(!email || !pass) return showToast('Preencha email e senha');
            try { await auth.createUserWithEmailAndPassword(email, pass); showToast('Conta criada!'); } 
            catch(e) { showToast(e.message); }
        };
        document.getElementById('forgotPasswordBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            if(!email) { showToast('Digite seu email no campo acima'); return; }
            sendPasswordReset(email);
        };
    }
    
    auth.onAuthStateChanged(async user => {
        if(user) { currentUser = user; await renderDashboard(); }
        else { currentUser = null; renderLogin(); }
    });
</script>
</body>
</html>
