<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAM Cash • Cartão Visa Oficial | Palanca Negra</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0f0a 0%, #0c0b05 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "🦌 🌅 🎵 🎶 💰";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 70px;
            opacity: 0.03;
            pointer-events: none;
            white-space: pre;
            overflow: hidden;
            letter-spacing: 30px;
            animation: floatMoney 40s infinite linear;
            z-index: 0;
        }
        @keyframes floatMoney {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(-200px) translateX(50px); }
        }
        .app-container { max-width: 680px; margin: 0 auto; position: relative; z-index: 2; }
        
        /* Cartão Visa Oficial - Palanca Negra */
        .visa-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070');
            background-size: cover;
            background-position: center;
            border-radius: 28px;
            padding: 28px 24px;
            margin-bottom: 24px;
            box-shadow: 0 30px 45px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(212, 175, 55, 0.5);
            position: relative;
            overflow: hidden;
            color: white;
        }
        .visa-card::before {
            content: "🦌";
            position: absolute;
            bottom: -30px;
            right: -20px;
            font-size: 120px;
            opacity: 0.15;
            transform: rotate(-10deg);
        }
        .card-brand {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .visa-logo {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(95deg, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #d4af37, #b8941e);
            border-radius: 8px;
            position: relative;
        }
        .card-chip::after {
            content: "💠";
            position: absolute;
            top: 6px;
            left: 12px;
            font-size: 18px;
            opacity: 0.7;
        }
        .card-number-display {
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 25px;
            font-family: monospace;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .card-details-row { display: flex; gap: 40px; margin-bottom: 25px; }
        .card-detail-label { font-size: 0.65rem; opacity: 0.8; letter-spacing: 1px; }
        .card-detail-value { font-size: 1rem; font-weight: bold; font-family: monospace; }
        .toggle-card-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            backdrop-filter: blur(5px);
        }
        .toggle-card-btn:hover { background: rgba(212, 175, 55, 0.6); border-color: #d4af37; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .status-verified { background: #2ecc71; color: #0a0a0a; }
        .status-premium { background: #d4af37; color: #0a0a0a; }
        
        .currency-tabs {
            display: flex;
            gap: 12px;
            background: #12100c;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid #3a321c;
        }
        .currency-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            border-radius: 50px;
            font-weight: bold;
            color: #b9a46b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .currency-btn.active { background: #d4af37; color: #0a0a0a; }
        
        .balance-box {
            background: linear-gradient(145deg, #0e0c07, #080703);
            border-radius: 28px;
            padding: 22px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #d4af3740;
        }
        .balance-amount { font-size: 2.9rem; font-weight: 800; color: #f5c542; }
        
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .btn-gold {
            background: linear-gradient(95deg, #d4af37, #b8941e);
            border: none;
            padding: 15px;
            border-radius: 48px;
            font-weight: bold;
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d4af37;
            padding: 15px;
            border-radius: 48px;
            color: #d4af37;
            font-weight: bold;
            cursor: pointer;
        }
        
        .settings-section {
            background: #12100b;
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid #2a2416;
        }
        
        .camera-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .camera-container {
            width: 100%;
            max-width: 400px;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
        }
        .camera-preview { width: 100%; height: 400px; background: #000; }
        .camera-preview video { width: 100%; height: 100%; object-fit: cover; }
        .captured-photo { width: 100%; height: 400px; object-fit: contain; background: #1a1710; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1710;
            max-width: 94%;
            width: 500px;
            border-radius: 48px;
            padding: 32px;
            border-top: 4px solid #d4af37;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1b12;
            color: #ffdf9c;
            padding: 12px 28px;
            border-radius: 60px;
            border-left: 5px solid #d4af37;
            z-index: 3000;
            display: none;
            font-weight: bold;
        }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px; width: 100%; padding: 14px; background: #2c271e; border: 1px solid #d4af3760; border-radius: 60px; color: #fff; }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #d4af37;
            background: transparent;
            border: none;
        }
        .phone-container { display: flex; gap: 12px; margin: 12px 0; }
        .phone-code { width: 100px; padding: 14px; background: #2c271e; border: 1px solid #d4af3760; border-radius: 60px; color: #d4af37; text-align: center; }
        .phone-number { flex: 1; padding: 14px; background: #2c271e; border: 1px solid #d4af3760; border-radius: 60px; color: #fff; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: #2c271e; border: 1px solid #d4af3760; border-radius: 60px; color: #fff; }
        
        @media (max-width: 500px) {
            .balance-amount { font-size: 2rem; }
            .card-number-display { font-size: 1rem; letter-spacing: 2px; }
            .phone-container { flex-direction: column; }
            .phone-code { width: 100%; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>
<div id="toastMessage" class="toast"></div>

<script>
    // ============================================
    // FIREBASE CONFIG
    // ============================================
    const firebaseConfig = {
        apiKey: 'AIzaSyC90uEwso8ZP3s7tLvV_z88ZbUijXLOpPU',
        authDomain: 'project-73108ea9-d1b2-4ac3-8fb.firebaseapp.com',
        projectId: 'project-73108ea9-d1b2-4ac3-8fb',
        storageBucket: 'project-73108ea9-d1b2-4ac3-8fb.firebasestorage.app',
        messagingSenderId: '869497428830',
        appId: '1:869497428830:web:27ef20567761e7b0d3cdcf'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ============================================
    // EMAILJS CONFIG
    // ============================================
    emailjs.init("vuAVZ5U4lRBZcsIon");

    // ============================================
    // VARIÁVEIS GLOBAIS
    // ============================================
    const ADMIN_EMAIL = "mamfilhos29@gmail.com";
    let currentUser = null;
    let currentCurrency = 'AOA';
    let userBalances = { AOA: 15000, USD: 0, BRL: 0 };
    let userCardData = null;
    let isCardVisible = false;
    let isDistribuidoraUser = false;
    let cameraStream = null;
    let capturedImageData = null;

    // Países com códigos
    const countriesWithCodes = [
        { name: "Angola", code: "+244" }, { name: "Brasil", code: "+55" }, { name: "Portugal", code: "+351" },
        { name: "Estados Unidos", code: "+1" }, { name: "Reino Unido", code: "+44" }, { name: "Alemanha", code: "+49" },
        { name: "França", code: "+33" }, { name: "Espanha", code: "+34" }, { name: "Moçambique", code: "+258" },
        { name: "Cabo Verde", code: "+238" }, { name: "São Tomé", code: "+239" }
    ];

    // URL Parameters - Detectar email da MAM Distribuidora
    const urlParams = new URLSearchParams(window.location.search);
    const preFilledEmail = urlParams.get('email');
    const isFromDistribuidora = urlParams.get('from') === 'distribuidora' || preFilledEmail !== null;

    // ============================================
    // FUNÇÕES AUXILIARES
    // ============================================
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#2c1a1a' : '#1f1b12';
        toast.style.borderLeftColor = isError ? '#e74c3c' : '#d4af37';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    function formatMoney(value, currency) {
        if (isNaN(value)) value = 0;
        return new Intl.NumberFormat('pt-AO', { style: 'currency', currency: currency, minimumFractionDigits: 2 }).format(value);
    }

    // Gerar dados do cartão Visa
    function generateCardNumber() {
        let num = '';
        for (let i = 0; i < 16; i++) num += Math.floor(Math.random() * 10);
        return num.match(/.{4}/g).join(' ');
    }
    function generateCVV() { return Math.floor(100 + Math.random() * 900).toString(); }
    const EXPIRY_DATE = "05/31"; // Validade fixa de 5 anos

    // ============================================
    // CARREGAR DADOS DO USUÁRIO
    // ============================================
    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            userBalances = { AOA: data.balances?.AOA ?? (isDistribuidoraUser ? 50000 : 0), USD: data.balances?.USD ?? 0, BRL: data.balances?.BRL ?? 0 };
            userCardData = data.cardData || { number: generateCardNumber(), cvv: generateCVV(), expiry: EXPIRY_DATE };
            window.userFullName = `${data.firstName || ''} ${data.lastName || ''}`;
            window.userEmail = data.email;
            if (!data.cardData && isDistribuidoraUser) {
                // Distribuidora user ganha cartão automático
                await db.collection('users').doc(uid).update({ cardData: userCardData, cardActivated: true });
            }
        } else if (isDistribuidoraUser) {
            // Usuário da distribuidora cria conta com cartão ativo
            userCardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: EXPIRY_DATE };
            userBalances = { AOA: 50000, USD: 0, BRL: 0 };
        }
    }

    // ============================================
    // ENVIO DE EMAIL VIA EMAILJS
    // ============================================
    async function sendEmailViaEmailJS(to, subject, message) {
        try {
            const templateParams = { to_email: to, subject: subject, message: message };
            await emailjs.send('default_service', 'template_mam_cash', templateParams);
            return true;
        } catch (error) {
            console.error('EmailJS error:', error);
            return false;
        }
    }

    // ============================================
    // KYC COM CÂMARA (FECHA IMEDIATAMENTE APÓS FOTO)
    // ============================================
    function openCameraForKYC() {
        const modal = document.createElement('div');
        modal.className = 'camera-modal';
        modal.innerHTML = `
            <div class="camera-container">
                <div class="camera-preview"><video id="cameraVideo" autoplay playsinline></video></div>
                <div style="display:flex; gap:12px; padding:20px;">
                    <button id="capturePhotoBtn" class="btn-gold" style="flex:1;"><i class="fas fa-camera"></i> Tirar Foto</button>
                    <button id="closeCameraBtn" class="btn-outline" style="flex:1;">Fechar</button>
                </div>
            </div>
            <canvas id="photoCanvas" style="display:none;"></canvas>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
        
        const video = document.getElementById('cameraVideo');
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            cameraStream = stream;
            video.srcObject = stream;
        }).catch(e => showToast('Erro ao acessar câmera: ' + e.message, true));
        
        document.getElementById('capturePhotoBtn').onclick = () => {
            const canvas = document.getElementById('photoCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImageData = canvas.toDataURL('image/jpeg');
            
            // Fechar câmera IMEDIATAMENTE após capturar
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
            modal.remove();
            
            // Mostrar preview para confirmar
            showPreviewAndSubmit(capturedImageData);
        };
        
        document.getElementById('closeCameraBtn').onclick = () => {
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
            modal.remove();
        };
    }
    
    function showPreviewAndSubmit(imageData) {
        const confirmModal = document.createElement('div');
        confirmModal.className = 'modal';
        confirmModal.innerHTML = `
            <div class="modal-content">
                <h3 style="color:#d4af37;"><i class="fas fa-id-card"></i> Confirmar Documento</h3>
                <img src="${imageData}" style="width:100%; border-radius:16px; margin:15px 0;">
                <p style="color:#b9a46b;">Confirme se a imagem está legível antes de enviar.</p>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button id="confirmKycBtn" class="btn-gold">✅ Confirmar e Enviar</button>
                    <button id="retakePhotoBtn" class="btn-outline">📷 Tirar Novamente</button>
                </div>
            </div>`;
        document.body.appendChild(confirmModal);
        confirmModal.style.display = 'flex';
        
        document.getElementById('confirmKycBtn').onclick = async () => {
            showToast('📤 Enviando documento para análise...', false);
            // Simular envio para Firebase Storage
            const docRef = await db.collection('kycRequests').add({
                userId: currentUser.uid,
                userEmail: currentUser.email,
                documentImage: imageData,
                status: 'pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('✅ Documento enviado! Aguarde aprovação do administrador.', false);
            confirmModal.remove();
            renderDashboard();
        };
        
        document.getElementById('retakePhotoBtn').onclick = () => {
            confirmModal.remove();
            openCameraForKYC();
        };
    }

    // ============================================
    // RENDERIZAÇÃO DO DASHBOARD
    // ============================================
    async function renderDashboard() {
        if (!currentUser) { renderLogin(); return; }
        await loadUserData(currentUser.uid);
        
        const balanceNow = userBalances[currentCurrency] || 0;
        const isAdmin = (currentUser.email === ADMIN_EMAIL);
        const isVerified = true; // Distribuidora user já é verified
        
        const maskedNumber = userCardData ? userCardData.number : '**** **** **** ****';
        const maskedCVV = '***';
        const actualCVV = userCardData?.cvv || '***';
        const displayCVV = isCardVisible && userCardData ? actualCVV : maskedCVV;
        const displayNumber = isCardVisible && userCardData ? userCardData.number : maskedNumber;
        
        let html = `
            <div class="app-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div><i class="fas fa-music" style="color:#d4af37"></i> <span style="color:#e6d5a8;">${window.userFullName || currentUser.email}</span>
                        ${isDistribuidoraUser ? '<span class="status-badge status-premium" style="margin-left:10px;">🎵 MAM Distribuidora</span>' : ''}
                    </div>
                    <button id="logoutBtn" style="background:#222216; border:1px solid #d4af37; padding:8px 18px; border-radius:40px; color:#d4af37; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Sair</button>
                </div>
                
                <!-- CARTÃO VISA OFICIAL - PALANCA NEGRA -->
                <div class="visa-card">
                    <div class="card-brand">
                        <div class="visa-logo">VISA MAM Cash</div>
                        <div class="card-chip"></div>
                    </div>
                    <div class="card-number-display">${displayNumber}</div>
                    <div class="card-details-row">
                        <div>
                            <div class="card-detail-label">VALIDADE</div>
                            <div class="card-detail-value">${userCardData?.expiry || '05/31'}</div>
                        </div>
                        <div>
                            <div class="card-detail-label">CVV</div>
                            <div class="card-detail-value" id="cvvValue">${displayCVV}</div>
                        </div>
                    </div>
                    <button id="toggleCardBtn" class="toggle-card-btn">
                        <i class="fas ${isCardVisible ? 'fa-eye-slash' : 'fa-eye'}"></i> 
                        ${isCardVisible ? 'Ocultar Dados' : 'Exibir Dados do Cartão'}
                    </button>
                </div>
                
                <!-- MOEDAS -->
                <div class="currency-tabs">
                    <button class="currency-btn ${currentCurrency === 'AOA' ? 'active' : ''}" data-cur="AOA"><i class="fas fa-coins"></i> Kwanza</button>
                    <button class="currency-btn ${currentCurrency === 'USD' ? 'active' : ''}" data-cur="USD"><i class="fas fa-dollar-sign"></i> USD</button>
                    <button class="currency-btn ${currentCurrency === 'BRL' ? 'active' : ''}" data-cur="BRL"><i class="fas fa-real"></i> Real</button>
                </div>
                
                <div class="balance-box">
                    <div style="font-size:0.8rem; color:#d4af37;">Saldo disponível</div>
                    <div class="balance-amount">${formatMoney(balanceNow, currentCurrency)}</div>
                </div>
                
                <div class="action-grid">
                    <button id="btnTransfer" class="btn-gold"><i class="fas fa-exchange-alt"></i> Transferir</button>
                    <button id="btnDeposit" class="btn-gold"><i class="fas fa-upload"></i> Depositar</button>
                    <button id="btnWithdraw" class="btn-outline"><i class="fas fa-download"></i> Sacar</button>
                </div>
                
                <div class="settings-section">
                    <div class="settings-title"><i class="fas fa-university"></i> Configurações de Saque</div>
                    <div class="phone-container">
                        <select id="countryCodeSelect" class="phone-code">${countriesWithCodes.map(c => `<option value="${c.code}" ${c.code === '+244' ? 'selected' : ''}>${c.code}</option>`).join('')}</select>
                        <input type="text" id="ibanInput" placeholder="IBAN (ex: AO06 0000 0000 0000 0000 0000 0)">
                    </div>
                    <input type="email" id="paypalInput" placeholder="Email do PayPal">
                    <button id="saveSettingsBtn" class="btn-gold" style="width:100%; margin-top:10px;"><i class="fas fa-save"></i> Salvar Configurações</button>
                </div>`;
        
        // Se não for usuário da distribuidora, mostrar botão KYC
        if (!isDistribuidoraUser && !isAdmin) {
            html += `
                <div class="settings-section" style="text-align:center;">
                    <div class="settings-title"><i class="fas fa-id-card"></i> Verificação de Identidade (KYC)</div>
                    <p style="color:#b9a46b; margin-bottom:15px;">Para desbloquear saques, envie uma foto do seu Documento de Identidade.</p>
                    <button id="openKycBtn" class="btn-gold"><i class="fas fa-camera"></i> Enviar Documento</button>
                </div>`;
        }
        
        document.getElementById('appRoot').innerHTML = html;
        
        // Eventos
        document.querySelectorAll('.currency-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentCurrency = btn.getAttribute('data-cur'); renderDashboard(); });
        });
        
        document.getElementById('toggleCardBtn')?.addEventListener('click', () => {
            if (!userCardData) return;
            isCardVisible = !isCardVisible;
            renderDashboard();
        });
        
        document.getElementById('btnTransfer')?.addEventListener('click', () => openTransferModal());
        document.getElementById('btnDeposit')?.addEventListener('click', () => openDepositModal());
        document.getElementById('btnWithdraw')?.addEventListener('click', () => showToast('Funcionalidade em desenvolvimento', false));
        document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
        document.getElementById('openKycBtn')?.addEventListener('click', () => openCameraForKYC());
        
        document.getElementById('saveSettingsBtn')?.addEventListener('click', async () => {
            const countryCode = document.getElementById('countryCodeSelect').value;
            const iban = document.getElementById('ibanInput').value;
            const paypal = document.getElementById('paypalInput').value;
            await db.collection('users').doc(currentUser.uid).update({ linkedIBAN: `${countryCode} ${iban}`, linkedPaypal: paypal });
            showToast('✅ Configurações salvas!', false);
        });
    }
    
    // ============================================
    // MODAL DE TRANSFERÊNCIA
    // ============================================
    async function openTransferModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3 style="color:#d4af37;"><i class="fas fa-paper-plane"></i> Transferir</h3>
            <input id="transferEmail" placeholder="Email do destinatário"><input id="transferAmount" type="number" placeholder="Valor">
            <select id="transferCurrency"><option>AOA</option><option>USD</option><option>BRL</option></select>
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="confirmTransfer" class="btn-gold">Enviar</button><button id="closeModal" class="btn-outline">Cancelar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        
        document.getElementById('confirmTransfer').onclick = async () => {
            const toEmail = document.getElementById('transferEmail').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const currency = document.getElementById('transferCurrency').value;
            if (!toEmail || isNaN(amount) || amount <= 0) { showToast('Dados inválidos', true); return; }
            if (userBalances[currency] < amount) { showToast('Saldo insuficiente', true); return; }
            
            const usersSnap = await db.collection('users').where('email', '==', toEmail).get();
            if (usersSnap.empty) { showToast('Destinatário não encontrado', true); return; }
            
            const targetUser = usersSnap.docs[0];
            const targetBalances = targetUser.data().balances || { AOA: 0, USD: 0, BRL: 0 };
            targetBalances[currency] = (targetBalances[currency] || 0) + amount;
            userBalances[currency] -= amount;
            
            await db.collection('users').doc(targetUser.id).update({ balances: targetBalances });
            await db.collection('users').doc(currentUser.uid).update({ balances: userBalances });
            
            // Enviar email de notificação via EmailJS
            await sendEmailViaEmailJS(toEmail, 'Transferência Recebida', `Você recebeu ${formatMoney(amount, currency)} de ${currentUser.email}`);
            
            showToast(`Transferência de ${formatMoney(amount, currency)} enviada.`, false);
            modal.remove(); renderDashboard();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }
    
    async function openDepositModal() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3 style="color:#d4af37;"><i class="fas fa-upload"></i> Solicitar Depósito</h3>
            <input id="depositAmount" type="number" placeholder="Valor"><select id="depositCurrency"><option>AOA</option><option>USD</option><option>BRL</option></select>
            <textarea id="depositProof" placeholder="Comprovativo de pagamento" rows="3"></textarea>
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="sendDeposit" class="btn-gold">Solicitar</button><button id="closeDeposit" class="btn-outline">Fechar</button></div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
        
        document.getElementById('sendDeposit').onclick = async () => {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const currency = document.getElementById('depositCurrency').value;
            const proof = document.getElementById('depositProof').value;
            if (isNaN(amount) || amount <= 0) { showToast('Valor inválido', true); return; }
            
            await db.collection('deposits').add({
                userId: currentUser.uid, userEmail: currentUser.email,
                amount, currency, proof, status: 'pending',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast(`📤 Pedido de depósito de ${formatMoney(amount, currency)} enviado.`, false);
            modal.remove();
        };
        document.getElementById('closeDeposit').onclick = () => modal.remove();
    }
    
    // ============================================
    // LOGIN E REGISTRO
    // ============================================
    function renderLogin() {
        const emailValue = preFilledEmail || '';
        const emailReadonly = preFilledEmail ? 'readonly' : '';
        
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:460px; margin: 5vh auto; background:#12100b; border-radius:56px; padding:38px 28px; border:1px solid #d4af37;">
                <div style="text-align:center;"><i class="fas fa-credit-card" style="font-size:3rem; color:#d4af37;"></i><h2 style="color:#d4af37;">MAM Cash</h2><p style="color:#b99f5a;">Cartão Visa Oficial • Palanca Negra</p></div>
                <div id="loginView">
                    <input id="loginEmail" placeholder="Email" value="${emailValue}" ${emailReadonly} style="width:100%; margin:16px 0 12px; padding:14px; background:#2a241b; border-radius:60px; color:white;">
                    <div class="password-wrapper"><input id="loginPassword" type="password" placeholder="Senha" style="width:100%; padding:14px; background:#2a241b; border-radius:60px;"><button type="button" id="toggleLoginPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                    <button id="doLogin" class="btn-gold" style="width:100%; margin-top:16px;">Entrar</button>
                    <button id="goToRegister" class="btn-outline" style="width:100%; margin-top:12px;">Criar Conta</button>
                    <div id="forgotPasswordBtn" style="text-align:center; margin-top:16px; cursor:pointer; color:#d4af37;"><i class="fas fa-key"></i> Esqueci minha senha</div>
                </div>
            </div>`;
        
        document.getElementById('toggleLoginPass')?.addEventListener('click', () => { const inp = document.getElementById('loginPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('doLogin').onclick = async () => {
            try {
                await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
                isDistribuidoraUser = isFromDistribuidora || preFilledEmail !== null;
                renderDashboard();
            } catch(e) { showToast(e.message, true); }
        };
        document.getElementById('goToRegister').onclick = () => renderRegister();
        document.getElementById('forgotPasswordBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            if (email) auth.sendPasswordResetEmail(email).then(() => showToast('Email de recuperação enviado!')).catch(e => showToast(e.message, true));
            else showToast('Digite seu email', true);
        };
    }
    
    function renderRegister() {
        const emailValue = preFilledEmail || '';
        const emailReadonly = preFilledEmail ? 'readonly' : '';
        let countryOptions = countriesWithCodes.map(c => `<option value="${c.name}" ${c.name === 'Angola' ? 'selected' : ''}>${c.name}</option>`).join('');
        
        document.getElementById('appRoot').innerHTML = `
            <div style="max-width:480px; margin: 3vh auto; background:#12100b; border-radius:56px; padding:32px 28px; border:1px solid #d4af37;">
                <h2 style="color:#d4af37; text-align:center;">Criar Conta</h2>
                <input id="regFirstName" placeholder="Nome" style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <input id="regLastName" placeholder="Sobrenome" style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <input id="regEmail" placeholder="Email" value="${emailValue}" ${emailReadonly} style="width:100%; margin:8px 0; padding:12px; background:#2a241b; border-radius:60px;">
                <select id="regCountry" class="country-select">${countryOptions}</select>
                <div class="phone-container">
                    <span id="phoneCode" class="phone-code">+244</span>
                    <input id="regPhone" class="phone-number" placeholder="999 999 999">
                </div>
                <div class="password-wrapper"><input id="regPassword" type="password" placeholder="Senha (min 6)"><button type="button" id="toggleRegPass" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <div class="password-wrapper"><input id="regConfirmPassword" type="password" placeholder="Confirmar Senha"><button type="button" id="toggleRegConfirm" class="toggle-password"><i class="fas fa-eye"></i></button></div>
                <button id="doRegister" class="btn-gold" style="width:100%; margin-top:16px;">Registrar</button>
                <button id="backToLogin" class="btn-outline" style="width:100%; margin-top:12px;">Voltar ao Login</button>
            </div>`;
        
        document.getElementById('toggleRegPass')?.addEventListener('click', () => { const inp = document.getElementById('regPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        document.getElementById('toggleRegConfirm')?.addEventListener('click', () => { const inp = document.getElementById('regConfirmPassword'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
        
        document.getElementById('doRegister').onclick = async () => {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const phoneCode = document.getElementById('phoneCode').innerText;
            const phoneNumber = document.getElementById('regPhone').value;
            const fullPhone = `${phoneCode} ${phoneNumber}`;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!firstName || !lastName || !email || !phoneNumber || !password) { showToast('Preencha todos os campos', true); return; }
            if (password !== confirm) { showToast('Senhas não coincidem', true); return; }
            if (password.length < 6) { showToast('Senha mínima 6 caracteres', true); return; }
            
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const cardData = { number: generateCardNumber(), cvv: generateCVV(), expiry: EXPIRY_DATE };
                await db.collection('users').doc(userCred.user.uid).set({
                    firstName, lastName, email, phone: fullPhone,
                    balances: { AOA: isFromDistribuidora ? 50000 : 0, USD: 0, BRL: 0 },
                    cardData: cardData,
                    cardActivated: true,
                    kycStatus: isFromDistribuidora ? 'verified' : 'pending',
                    linkedIBAN: '', linkedPaypal: '',
                    isDistribuidoraUser: isFromDistribuidora,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                if (isFromDistribuidora) {
                    await sendEmailViaEmailJS(email, 'Bem-vindo à MAM Cash', `Olá ${firstName}, seu cartão Visa MAM Cash já está ativo! Aproveite os benefícios exclusivos.`);
                }
                
                showToast(isFromDistribuidora ? '✅ Conta criada! Seu cartão já está ativo.' : 'Conta criada! Complete o KYC.', false);
                isDistribuidoraUser = isFromDistribuidora;
                renderDashboard();
            } catch(e) { showToast(e.message, true); }
        };
        document.getElementById('backToLogin').onclick = () => renderLogin();
        document.getElementById('regCountry').addEventListener('change', (e) => {
            const country = countriesWithCodes.find(c => c.name === e.target.value);
            if (country) document.getElementById('phoneCode').innerText = country.code;
        });
    }
    
    auth.onAuthStateChanged(async user => {
        if (user) { currentUser = user; await renderDashboard(); }
        else { currentUser = null; renderLogin(); }
    });
</script>
